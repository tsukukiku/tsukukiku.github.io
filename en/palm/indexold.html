<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手相命运分析 | Palm Reading & Fate Analysis | 手相鑑定</title>
    <meta
      name="description"
      content="上传手掌照片，生成手相命运分析、掌纹解读文字与高级海报风手相解读图片。"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1018;
        --panel: rgba(18, 23, 33, 0.8);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f8f2e7;
        --muted: #b8c0cf;
        --gold: #e7bc6a;
        --blue: #78bde8;
        --rose: #e1889c;
        --green: #abd66e;
        --orange: #eba450;
        --violet: #c499ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(rgba(6, 10, 18, 0.42), rgba(6, 10, 18, 0.72)),
          url("palm-bg.png") center top / cover fixed,
          linear-gradient(135deg, #0c1018 0%, #171c29 48%, #211825 100%);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans",
          "Yu Gothic",
          system-ui,
          sans-serif;
      }

      a {
        color: var(--gold);
      }

      main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
        color: var(--muted);
      }

      .home-link {
        color: var(--muted);
        text-decoration: none;
      }

      .site-title {
        text-align: center;
      }

      .site-title strong {
        display: block;
        color: var(--text);
        font-size: clamp(1.8rem, 6.3vw, 3.06rem);
        line-height: 1.15;
      }

      .site-title span {
        display: block;
        color: var(--muted);
        font-size: 0.97rem;
        font-weight: 800;
        line-height: 1.45;
      }

      .top-quota {
        min-width: 88px;
        color: var(--gold);
        font-weight: 800;
        text-align: right;
      }

      .workspace,
      .status-panel,
      .result-panel,
      .poster-panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(12px);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(280px, 0.86fr) minmax(0, 1.14fr);
        gap: 20px;
        padding: 22px;
      }

      .upload-card {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .upload-box {
        display: grid;
        gap: 10px;
        place-items: center;
        min-height: 154px;
        border: 1px dashed rgba(231, 188, 106, 0.56);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        padding: 22px;
        text-align: center;
      }

      .upload-box strong {
        color: var(--gold);
        font-size: 1.2rem;
      }

      .upload-box span {
        font-size: 0.86rem;
      }

      .upload-box span,
      .notice,
      .small {
        color: var(--muted);
        line-height: 1.7;
      }

      input[type="file"] {
        width: 100%;
        min-height: 54px;
        font-size: 1.05rem;
      }

      input[type="file"]::file-selector-button {
        min-height: 44px;
        margin-right: 12px;
        border: 1px solid rgba(231, 188, 106, 0.72);
        border-radius: 8px;
        color: #151922;
        background: var(--gold);
        padding: 0 18px;
        font: inherit;
        font-weight: 800;
      }

      button,
      .download-button {
        min-height: 46px;
        border: 1px solid rgba(231, 188, 106, 0.72);
        border-radius: 8px;
        color: #151922;
        background: var(--gold);
        padding: 0 18px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }

      button:disabled,
      .download-button.is-disabled {
        border-color: rgba(255, 255, 255, 0.14);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.08);
        cursor: not-allowed;
        pointer-events: none;
      }

      .status {
        min-height: 24px;
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status.is-loading {
        color: var(--gold);
        font-weight: 800;
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      @keyframes statusPulse {
        0%,
        100% {
          opacity: 0.45;
        }

        50% {
          opacity: 1;
        }
      }

      .task-id {
        overflow-wrap: anywhere;
        margin: 0;
        color: var(--gold);
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 0.9rem;
      }

      .preview-stage {
        position: relative;
        min-height: 520px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(5, 8, 14, 0.5);
      }

      .preview-stage img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 520px;
        object-fit: contain;
      }

      .status-panel,
      .result-panel,
      .poster-panel {
        margin-top: 18px;
        padding: 22px;
      }

      .progress {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .step {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.05);
        text-align: center;
      }

      .step.is-active {
        border-color: rgba(231, 188, 106, 0.72);
        color: var(--text);
        background: rgba(231, 188, 106, 0.12);
      }

      .section-title {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .section-title h2 {
        margin: 0;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .result-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        padding: 16px;
      }

      .result-item h3 {
        margin: 0 0 10px;
        color: var(--gold);
        font-size: 1rem;
      }

      .result-item p {
        margin: 0;
        color: #dfe7ef;
        line-height: 1.75;
      }

      .bottom-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .bottom-grid .result-item:nth-child(1) h3 {
        color: var(--violet);
      }

      .bottom-grid .result-item:nth-child(2) h3 {
        color: var(--blue);
      }

      .bottom-grid .result-item:nth-child(3) h3 {
        color: var(--green);
      }

      .bottom-grid .result-item:nth-child(4) h3 {
        color: var(--orange);
      }

      .poster-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .poster-preview {
        display: grid;
        place-items: center;
        min-height: 260px;
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .poster-preview img {
        display: block;
        width: min(100%, 520px);
        height: auto;
      }

      .countdown {
        color: var(--gold);
        font-weight: 800;
      }

      @media (max-width: 860px) {
        .workspace,
        .result-grid,
        .bottom-grid,
        .progress {
          grid-template-columns: 1fr;
        }

        .topbar {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .top-quota {
          text-align: center;
        }

        .preview-stage,
        .preview-stage img {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <a class="home-link" href="../">返回首页</a>
        <div class="site-title">
          <strong>手相命运分析</strong>
          <span>Palm Reading & Fate Analysis</span>
          <span>手相鑑定</span>
        </div>
        <span class="top-quota">每日分析次数 2</span>
      </div>

      <section class="workspace">
        <div class="upload-card">
          <label class="upload-box">
            <strong>上传手掌照片</strong>
            <span>支持 JPG / PNG / WebP，图片需小于 3MB。建议使用清晰、无遮挡、光线均匀的手掌正面照片。</span>
            <input id="palmFile" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>

          <button id="submitButton" type="button" disabled>提交分析任务</button>
          <p class="status" id="statusText">请先上传照片。</p>
          <p class="task-id" id="taskIdText"></p>

          <p class="notice">
            AI先返回文字分析，随后生成高级海报图片，请稍等。
          </p>
        </div>

        <div class="preview-stage">
          <img id="palmPreview" alt="手掌照片预览" hidden />
        </div>
      </section>

      <section class="status-panel" id="statusPanel" hidden>
        <strong>任务状态：<span id="taskStatusLabel">等待提交</span></strong>
        <div class="progress" aria-label="处理进度">
          <div class="step" data-step="queued">排队中</div>
          <div class="step" data-step="processing">分析中</div>
          <div class="step" data-step="text_ready">文字完成</div>
          <div class="step" data-step="rendering">生成海报</div>
          <div class="step" data-step="ready">可下载</div>
        </div>
      </section>

      <section class="result-panel" id="resultPanel" hidden>
        <div class="section-title">
          <h2>手相文字解读</h2>
          <span class="small">第一步：AI 分析文字结果</span>
        </div>
        <div class="result-grid" id="mainResultGrid"></div>
        <div class="bottom-grid" id="bottomResultGrid"></div>
        <p class="small">本结果用于娱乐与自我观察参考，不构成医疗、投资或人生重大决策建议。</p>
      </section>

      <section class="poster-panel" id="posterPanel" hidden>
        <div class="section-title">
          <h2>高级海报风手相解读图</h2>
          <div class="poster-actions">
            <span class="countdown" id="countdownText">等待图片生成</span>
            <a class="download-button is-disabled" id="downloadReading" href="#" download="palm-reading.png">下载“手相解读”图</a>
          </div>
        </div>
        <div class="poster-preview" id="posterPreview">
          <span class="small">海报生成中，请稍候。</span>
        </div>
      </section>
    </main>

    <script>
      const API = {
        submit: "https://tsukukiku.synology.me/api/palm-submit.php",
        status: "https://tsukukiku.synology.me/api/palm-status.php",
        result: "https://tsukukiku.synology.me/api/palm-result.php"
      };

      const MAX_SIZE = 3 * 1024 * 1024;
      const MAIN_SECTION_TITLES = ["整体印象", "智慧线", "生命线", "感情线", "事业线", "财运分析", "总体运势解读"];
      const BOTTOM_SECTION_TITLES = ["性格特质", "适合领域", "开运建议", "幸运指引"];

      const palmFile = document.querySelector("#palmFile");
      const palmPreview = document.querySelector("#palmPreview");
      const submitButton = document.querySelector("#submitButton");
      const statusText = document.querySelector("#statusText");
      const taskIdText = document.querySelector("#taskIdText");
      const statusPanel = document.querySelector("#statusPanel");
      const taskStatusLabel = document.querySelector("#taskStatusLabel");
      const resultPanel = document.querySelector("#resultPanel");
      const mainResultGrid = document.querySelector("#mainResultGrid");
      const bottomResultGrid = document.querySelector("#bottomResultGrid");
      const posterPanel = document.querySelector("#posterPanel");
      const posterPreview = document.querySelector("#posterPreview");
      const countdownText = document.querySelector("#countdownText");
      const downloadReading = document.querySelector("#downloadReading");

      let uploadedFile = null;
      let previewUrl = "";
      let pollTimer = null;
      let countdownTimer = null;
      let currentTaskId = "";
      let readingImageUrl = "";
      let textHasRendered = false;

      const demoPayload = {
        status: "ready",
        main_sections: [
          { title: "整体印象", body: "掌型厚实，掌肉饱满，代表执行力强、抗压能力较好，目标明确时能坚持到底。" },
          { title: "智慧线", body: "智慧线较清晰，略微向下弯，说明思考能力强，兼具逻辑与想象力，适合分析、研究、技术或管理类工作。" },
          { title: "生命线", body: "生命线稳定，精力基础不错，但阶段性疲劳容易累积，建议保持规律作息。" },
          { title: "感情线", body: "感情线长度适中且带有分叉，表示感情上重视承诺，也需要被理解和尊重。" },
          { title: "事业线", body: "事业线显示后劲较强，越到后期越能体现经验价值，适合长期主义路线。" },
          { title: "财运分析", body: "财运偏向专业能力变现和长期积累，不宜追求短期冲动型收益。" },
          { title: "总体运势解读", body: "适合把经验转化为长期作品或专业服务。稳定积累带来的回报会逐渐明显。" }
        ],
        bottom_sections: [
          { title: "性格特质", body: "理性强，执行力高，耐心指数较好。" },
          { title: "适合领域", body: "技术、研究、工程、数据分析、管理与咨询。" },
          { title: "开运建议", body: "保持学习，持续精进，避免分散精力。" },
          { title: "幸运指引", body: "幸运色：深蓝与墨绿；幸运数字：3 / 8。" }
        ]
      };

      palmFile.addEventListener("change", () => {
        const file = palmFile.files?.[0];
        resetState();

        if (!file) {
          uploadedFile = null;
          submitButton.disabled = true;
          statusText.textContent = "请先上传照片。";
          statusText.classList.remove("is-loading");
          return;
        }

        if (file.size > MAX_SIZE) {
          uploadedFile = null;
          submitButton.disabled = true;
          palmPreview.hidden = true;
          statusText.textContent = "图片超过 3MB，请压缩后重新上传。";
          statusText.classList.remove("is-loading");
          return;
        }

        uploadedFile = file;
        if (previewUrl) URL.revokeObjectURL(previewUrl);
        previewUrl = URL.createObjectURL(file);
        palmPreview.src = previewUrl;
        palmPreview.hidden = false;
        submitButton.disabled = false;
        statusText.textContent = "照片已载入，可以提交分析任务。";
        statusText.classList.remove("is-loading");
      });

      submitButton.addEventListener("click", async () => {
        if (!uploadedFile) return;
        submitButton.disabled = true;
        statusPanel.hidden = false;
        setTaskStatus("queued");
        statusText.textContent = "正在上传图片，请稍后";
        statusText.classList.add("is-loading");
        statusText.scrollIntoView({ behavior: "smooth", block: "center" });

        try {
          const submitResult = await submitTask();
          currentTaskId = submitResult.task_id;
          taskIdText.textContent = `任务编号：${currentTaskId}`;
          statusText.textContent = submitResult.message || "任务已提交，正在等待分析。";
          statusText.classList.remove("is-loading");

          if (submitResult.main_sections || submitResult.sections) {
            renderTextResult(submitResult);
          }

          pollTask();
        } catch (error) {
          if (canUseDemoMode()) {
            currentTaskId = `demo-${Date.now()}`;
            taskIdText.textContent = `演示任务：${currentTaskId}`;
            statusText.textContent = "本地演示模式：正在生成模拟结果。";
            statusText.classList.remove("is-loading");
            runDemoFlow();
            return;
          }

          statusText.textContent = formatSubmitError(error);
          statusText.classList.remove("is-loading");
          setTaskStatus("failed");
          submitButton.disabled = false;
        }
      });

      async function submitTask() {
        const formData = new FormData();
        formData.append("handImage", uploadedFile);
        formData.append("handSide", "unknown");

        const response = await fetch(API.submit, {
          method: "POST",
          body: formData
        });

        const text = await response.text();
        let payload = null;
        try {
          payload = text ? JSON.parse(text) : null;
        } catch (error) {
          payload = null;
        }

        if (!response.ok) {
          throw new Error(payload?.error || payload?.message || text || `HTTP ${response.status}`);
        }

        return payload || {};
      }

      async function pollTask() {
        clearTimeout(pollTimer);

        try {
          const response = await fetch(`${API.status}?task_id=${encodeURIComponent(currentTaskId)}`);
          const text = await response.text();
          let data = null;
          try {
            data = text ? JSON.parse(text) : null;
          } catch (error) {
            data = null;
          }
          if (!response.ok) throw new Error(data?.error || data?.message || text || `HTTP ${response.status}`);
          if (!data) throw new Error("状态接口没有返回有效 JSON。");

          setTaskStatus(data.status);
          statusText.textContent = data.message || statusText.textContent;
          statusText.classList.remove("is-loading");

          if ((data.status === "text_ready" || data.status === "rendering" || data.status === "ready") && !textHasRendered) {
            renderTextResult(data);
          }

          if (data.status === "rendering") {
            showPosterWaiting();
          }

          if (data.status === "ready") {
            renderTextResult(data);
            showPosterReady(data);
            return;
          }

          if (data.status === "failed" || data.status === "expired") {
            statusText.textContent = data.message || "任务未能完成，请稍后重试。";
            statusText.classList.remove("is-loading");
            submitButton.disabled = false;
            return;
          }

          pollTimer = setTimeout(pollTask, 5000);
        } catch (error) {
          if (canUseDemoMode()) {
            statusText.textContent = "本地演示模式：状态查询失败，使用模拟结果。";
            statusText.classList.remove("is-loading");
            runDemoFlow();
            return;
          }

          statusText.textContent = `状态查询失败：${error.message || "请检查 Synology API 是否可访问。"}`;
          statusText.classList.remove("is-loading");
          setTaskStatus("failed");
          submitButton.disabled = false;
        }
      }

      async function runDemoFlow() {
        setTaskStatus("queued");
        await wait(650);
        setTaskStatus("processing");
        statusText.textContent = "演示：正在分析掌纹。";
        await wait(900);
        setTaskStatus("text_ready");
        renderTextResult(demoPayload);
        statusText.textContent = "演示：文字分析完成，正在生成海报图。";
        await wait(900);
        setTaskStatus("rendering");
        showPosterWaiting();
        await wait(900);
        setTaskStatus("ready");
        showPosterReady({
          ...demoPayload,
          image_url: await createReadingImage()
        });
      }

      function renderTextResult(data) {
        const mainSections = normalizeSections(data.main_sections || data.sections, MAIN_SECTION_TITLES);
        const bottomSections = normalizeSections(data.bottom_sections || data.footer_sections || data.lucky_sections, BOTTOM_SECTION_TITLES);

        resultPanel.hidden = false;
        textHasRendered = true;

        mainResultGrid.innerHTML = mainSections.map(renderSectionCard).join("");
        bottomResultGrid.innerHTML = bottomSections.map(renderSectionCard).join("");
      }

      function showPosterWaiting() {
        posterPanel.hidden = false;
        posterPreview.innerHTML = '<span class="small">高级海报风手相解读图生成中，请稍候。</span>';
        countdownText.textContent = "等待图片生成";
        downloadReading.classList.add("is-disabled");
        downloadReading.removeAttribute("href");
      }

      function showPosterReady(data) {
        clearTimeout(pollTimer);
        posterPanel.hidden = false;
        statusText.textContent = "分析完成，海报图已生成。";

        readingImageUrl = data.image_url || `${API.result}?task_id=${encodeURIComponent(currentTaskId)}`;
        posterPreview.innerHTML = `<img src="${escapeAttribute(readingImageUrl)}" alt="高级海报风手相解读图" />`;
        startDownloadCountdown();
      }

      function normalizeSections(sections, titles) {
        const source = Array.isArray(sections) ? sections : [];
        return titles.map((title, index) => {
          const found = source.find((item) => {
            const itemTitle = Array.isArray(item) ? item[0] : item?.title;
            return itemTitle && String(itemTitle).includes(title);
          }) || source[index];

          if (Array.isArray(found)) {
            return { title: found[0] || title, body: found[1] || "结果生成中。" };
          }

          return {
            title: found?.title || title,
            body: found?.body || found?.content || "结果生成中。"
          };
        });
      }

      function renderSectionCard(section) {
        return `<article class="result-item"><h3>${escapeHtml(section.title)}</h3><p>${escapeHtml(section.body)}</p></article>`;
      }

      function setTaskStatus(status) {
        const normalizedStatus = status === "analyzing" ? "processing" : status;
        const labelMap = {
          queued: "排队中",
          processing: "分析中",
          text_ready: "文字完成",
          rendering: "生成海报",
          ready: "已完成",
          failed: "失败",
          expired: "已过期"
        };

        taskStatusLabel.textContent = labelMap[normalizedStatus] || normalizedStatus;
        document.querySelectorAll(".step").forEach((step) => {
          step.classList.toggle("is-active", step.dataset.step === normalizedStatus);
        });
      }

      function formatSubmitError(error) {
        const message = String(error?.message || "");
        if (message.includes("今日") || message.includes("次数") || message.includes("limit") || message.includes("429")) {
          return "提交失败：超过当日次数。";
        }

        return `提交失败：${message || "没有连接到 Synology API，请检查域名、HTTPS、CORS 或 PHP 后端。"}`;
      }

      function startDownloadCountdown() {
        let seconds = 60;
        downloadReading.classList.add("is-disabled");
        downloadReading.removeAttribute("href");
        countdownText.textContent = `${seconds} 秒后可下载`;
        clearInterval(countdownTimer);

        countdownTimer = setInterval(() => {
          seconds -= 1;
          countdownText.textContent = `${seconds} 秒后可下载`;

          if (seconds <= 0) {
            clearInterval(countdownTimer);
            countdownText.textContent = "可以下载";
            downloadReading.classList.remove("is-disabled");
            downloadReading.href = readingImageUrl;
          }
        }, 1000);
      }

      async function createReadingImage() {
        const canvas = document.createElement("canvas");
        canvas.width = 1200;
        canvas.height = 1600;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#10131b";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#e7bc6a";
        ctx.lineWidth = 6;
        ctx.strokeRect(40, 40, 1120, 1520);

        ctx.fillStyle = "#e7bc6a";
        ctx.font = "bold 84px sans-serif";
        ctx.fillText("手相解读", 90, 135);

        ctx.fillStyle = "#f7f3ea";
        ctx.font = "34px sans-serif";
        ctx.fillText("上传手掌照片", 90, 195);

        if (!palmPreview.hidden) {
          const image = palmPreview;
          const ratio = Math.min(560 / image.naturalWidth, 760 / image.naturalHeight);
          const width = image.naturalWidth * ratio;
          const height = image.naturalHeight * ratio;
          ctx.drawImage(image, 90, 250, width, height);
        }

        ctx.fillStyle = "#dfe7ef";
        ctx.font = "28px sans-serif";
        let y = 1080;
        demoPayload.main_sections.slice(0, 5).forEach(({ title, body }) => {
          ctx.fillStyle = "#e7bc6a";
          ctx.fillText(title, 90, y);
          ctx.fillStyle = "#dfe7ef";
          wrapText(ctx, body, 90, y + 42, 980, 36);
          y += 112;
        });

        return canvas.toDataURL("image/png");
      }

      function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        let line = "";
        for (const char of text) {
          const testLine = line + char;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = char;
            y += lineHeight;
          } else {
            line = testLine;
          }
        }
        ctx.fillText(line, x, y);
      }

      function resetState() {
        clearTimeout(pollTimer);
        clearInterval(countdownTimer);
        currentTaskId = "";
        readingImageUrl = "";
        textHasRendered = false;
        taskIdText.textContent = "";
        statusPanel.hidden = true;
        resultPanel.hidden = true;
        posterPanel.hidden = true;
        mainResultGrid.innerHTML = "";
        bottomResultGrid.innerHTML = "";
        posterPreview.innerHTML = '<span class="small">海报生成中，请稍候。</span>';
        countdownText.textContent = "等待图片生成";
        downloadReading.classList.add("is-disabled");
        downloadReading.removeAttribute("href");
      }

      function canUseDemoMode() {
        return location.protocol === "file:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        })[char]);
      }

      function escapeAttribute(value) {
        return String(value ?? "").replace(/["'<>&]/g, (char) => ({
          "\"": "&quot;",
          "'": "&#039;",
          "<": "&lt;",
          ">": "&gt;",
          "&": "&amp;"
        })[char]);
      }
    </script>
  </body>
</html>
