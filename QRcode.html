<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>二维码生成器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16211f;
      --muted: #5d6b67;
      --line: #cfd8d4;
      --paper: #f7faf8;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --warn: #9a3412;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      position: relative;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.7rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .status {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
      padding: 0;
      margin: -1px;
      min-height: 0;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: right;
    }

    .header-actions {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: end;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .home-pill {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .home-pill:hover {
      border-color: var(--accent);
      background: #eef8f5;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 720px);
      gap: 22px;
      justify-content: center;
      align-items: start;
    }

    section {
      min-width: 0;
    }

    .panel,
    .preview {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .panel {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 650;
    }

    textarea,
    input[type="text"],
    input[type="number"],
    input[type="color"],
    input[type="file"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    textarea,
    input[type="text"],
    input[type="number"],
    input[type="file"],
    select {
      padding: 10px 11px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.45;
    }

    #content {
      min-height: 76px;
    }

    #captionText {
      min-height: 40px;
      max-height: 64px;
      resize: none;
    }

    input[type="color"] {
      height: 22px;
      padding: 2px;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    input[type="hidden"] {
      display: none;
    }

    input.no-spinner {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input.no-spinner::-webkit-outer-spin-button,
    input.no-spinner::-webkit-inner-spin-button {
      appearance: none;
      margin: 0;
    }

    .file-picker {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
    }

    .file-picker input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .file-button {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 750;
      cursor: pointer;
      white-space: nowrap;
    }

    .file-name {
      color: var(--muted);
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .logo-text-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .setting-column {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
      min-width: 0;
    }

    .setting-column > label {
      min-width: 0;
    }

    .style-board {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(150px, 0.92fr);
      gap: 12px;
      align-items: stretch;
    }

    .palette-panel,
    .finder-panel {
      min-width: 0;
    }

    .color-stack {
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: 3px;
      align-self: stretch;
    }

    .compact-field {
      min-height: 34px;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      align-items: center;
      gap: 5px;
      line-height: 1;
    }

    .compact-field input[type="color"],
    .compact-field select {
      height: 34px;
      min-height: 34px;
      padding: 2px 8px;
      line-height: 1;
    }

    .finder-panel {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .shape-panel {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill-button {
      min-height: 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 0.72rem;
      font-weight: 750;
      cursor: pointer;
    }

    .pill-button[aria-pressed="true"] {
      border-color: var(--accent);
      background: #eef8f5;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.14);
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .inline input {
      flex: 1;
    }

    .hint,
    .limit {
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 500;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 650;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 8px;
    }

    #paletteGrid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(2, 1fr);
    }

    #paletteGrid .choice-card {
      min-height: 34px;
      padding: 3px;
    }

    #paletteGrid .palette-demo {
      height: 28px;
    }

    .choice-card {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px;
      background: #fff;
      color: var(--ink);
      display: grid;
      gap: 0;
      place-items: center;
      font: inherit;
      font-size: 0.66rem;
      font-weight: 700;
      cursor: pointer;
    }

    #finderGrid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    #finderGrid .choice-card {
      min-height: 56px;
      padding: 5px;
      grid-template-rows: 30px 14px;
      line-height: 1;
    }

    #finderGrid .finder-demo {
      height: 30px;
      border: 0;
      background: transparent;
    }

    #finderGrid .finder-demo svg {
      width: 25px;
      height: 25px;
    }

    .choice-card[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.16);
    }

    .palette-demo,
    .finder-demo {
      width: 100%;
      height: 22px;
      border-radius: 5px;
      border: 1px solid rgba(22, 33, 31, 0.14);
      overflow: hidden;
    }

    .palette-demo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    .palette-demo::after {
      content: "";
      position: absolute;
      inset: 8px 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--p-fg), var(--p-fg2));
    }

    .finder-demo {
      display: grid;
      place-items: center;
      background: var(--f-bg);
    }

    .finder-demo svg {
      width: 30px;
      height: 30px;
      display: block;
    }

    .limit[data-state="warn"] {
      color: var(--warn);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:not(:disabled):hover {
      background: var(--accent-dark);
    }

    button.secondary:not(:disabled):hover {
      background: #eef5f2;
    }

    .choice-card,
    .choice-card:not(:disabled):hover {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    .choice-card:not(:disabled):hover,
    .choice-card[aria-pressed="true"] {
      background: #f4faf7;
    }

    .choice-card[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.16);
    }

    .preview {
      padding: 12px;
      display: grid;
      place-items: start center;
      min-height: 285px;
    }

    .panel > .preview {
      border: 0;
      background: transparent;
      padding: 0;
      min-height: 0;
    }

    .stage {
      width: min(100%, 310px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      background: #edf3f0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    canvas {
      width: 100%;
      height: auto;
      max-width: 260px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(22, 33, 31, 0.12);
    }

    @media (max-width: 800px) {
      header {
        display: grid;
        align-items: start;
      }

      .status {
        text-align: left;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .preview {
        min-height: auto;
      }

      .two {
        grid-template-columns: 1fr 1fr;
      }

      .three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .logo-text-board {
        grid-template-columns: 1fr 1fr;
      }

      .style-board {
        grid-template-columns: 1fr 1fr;
      }

      .finder-panel {
        grid-template-columns: 68px 1fr;
      }

      .shape-panel {
        grid-template-columns: 92px 1fr;
      }

      #finderGrid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
    }

    @media (max-width: 420px) {
      .two,
      .three,
      .logo-text-board,
      .style-board,
      .finder-panel,
      .shape-panel {
        grid-template-columns: 1fr;
      }

      #finderGrid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #paletteGrid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>二维码生成器</h1>
      <div class="header-actions">
        <a class="home-pill" href="https://star-style-studio.net/">返回主页</a>
        <div class="status" id="status" aria-live="polite"></div>
      </div>
    </header>

    <div class="layout">
      <section class="panel" aria-label="二维码设置">
        <label>
          内容
          <textarea id="content" spellcheck="false">https://example.com</textarea>
          <span class="limit" id="limit">0 / 78 bytes</span>
        </label>

        <div class="style-board">
          <label class="palette-panel">
            配色方案
            <select id="palette">
              <option value="custom" selected>自定义</option>
              <option value="purpleMint">紫色薄荷</option>
              <option value="violetWhite">圆点紫白</option>
              <option value="sunsetLilac">橙粉紫</option>
              <option value="ocean">海洋蓝绿</option>
              <option value="roseGold">玫瑰金</option>
              <option value="inkLime">墨绿青柠</option>
              <option value="mono">经典黑白</option>
              <option value="midnight">午夜霓虹</option>
            </select>
            <div class="choice-grid" id="paletteGrid" aria-label="配色方案图示"></div>
          </label>
          <div class="color-stack" aria-label="颜色和渐变设置">
            <label class="compact-field">
              <span>主色</span>
              <input id="fg" type="color" value="#111827">
            </label>
            <label class="compact-field">
              <span>背景色</span>
              <input id="bg" type="color" value="#ffffff">
            </label>
            <label class="compact-field">
              <span>过渡色</span>
              <input id="fg2" type="color" value="#14b8a6">
            </label>
            <label class="compact-field">
              <span>渐变</span>
              <select id="gradient">
                <option value="none">纯色</option>
                <option value="linear" selected>斜向渐变</option>
                <option value="radial">中心放射</option>
              </select>
            </label>
          </div>
        </div>

        <label class="finder-panel">
          <span>定位图案</span>
          <input id="finderStyle" type="hidden" value="rounded">
          <div class="choice-grid" id="finderGrid" aria-label="定位图案图示"></div>
        </label>

        <label class="shape-panel">
          <span>QRcode 图案</span>
          <select id="shape" hidden>
            <option value="square">方块</option>
            <option value="round" selected>圆角</option>
            <option value="dot">圆点</option>
            <option value="diamond">菱形</option>
          </select>
          <div class="pill-row" id="shapePills" aria-label="QRcode 图案样式"></div>
        </label>

        <section class="preview" aria-label="二维码预览">
          <div class="stage">
            <canvas id="canvas" width="512" height="512" aria-label="生成的二维码"></canvas>
          </div>
        </section>

        <div class="three">
          <label>
            图片尺寸
            <input id="size" type="hidden" value="512">
            <input id="sizeNumber" type="hidden" value="512">
            <div class="pill-row" id="sizePills" aria-label="图片尺寸"></div>
          </label>
          <label>
            留白距离
            <input id="margin" type="hidden" value="4">
            <div class="pill-row" id="marginPills" aria-label="留白距离"></div>
          </label>
          <label>
            Logo 大小
            <input id="logoSize" type="hidden" value="13">
            <input id="logoSizeNumber" type="hidden" value="13">
            <div class="pill-row" id="logoSizePills" aria-label="Logo 大小"></div>
          </label>
        </div>

        <div class="logo-text-board">
          <div class="setting-column">
            <label class="check">
              <input id="showLogo" type="checkbox" checked>
              QRcode中央加入Logo
            </label>
            <label>
              上传Logo图片
              <span class="file-picker">
                <input id="logoFile" type="file" accept="image/*">
                <span class="file-button" id="logoFileButton" role="button" tabindex="0">选择图片</span>
                <span class="file-name" id="logoFileName">未选择图片</span>
              </span>
            </label>
            <label>
              QRcode说明文字
              <span class="check">
                <input id="showCaption" type="checkbox" checked>
                显示说明文字
              </span>
              <textarea id="captionText" maxlength="72" rows="2" placeholder="最多两行说明文字">扫码进入</textarea>
            </label>
          </div>

          <div class="setting-column">
            <label>
              文字Logo
              <input id="logoText" type="text" maxlength="8" value="LOGO" placeholder="请填写文字Logo">
            </label>
            <label>
              文字颜色
              <select id="captionStyle">
                <option value="solid">单色</option>
                <option value="gradient" selected>渐变多色</option>
                <option value="rainbow">彩虹多色</option>
              </select>
            </label>
            <label>
              文字大小
              <span class="inline">
                <input id="captionSize" type="range" min="14" max="72" step="1" value="28">
                <input id="captionSizeNumber" class="no-spinner" type="number" min="14" max="72" step="1" value="28" aria-label="底部文字字号">
              </span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button id="png">下载 PNG</button>
          <button id="svg" class="secondary">下载 SVG</button>
          <button id="reset" class="secondary">重置</button>
        </div>

        <div class="hint">适合链接、短文字、邮箱、Wi-Fi 标签等内容。Logo 建议控制在 18% 以内，扫码更稳定。</div>
      </section>
    </div>
  </main>

  <script>
    const BYTE_CAPACITY = [0, 17, 32, 53, 78];
    const DATA_CODEWORDS = [0, 19, 34, 55, 80];
    const ECC_CODEWORDS = [0, 7, 10, 15, 20];
    const ALIGNMENT = { 1: [], 2: [18], 3: [22], 4: [26] };
    const EC_BITS = 1;

    const els = {
      content: document.getElementById("content"),
      fg: document.getElementById("fg"),
      fg2: document.getElementById("fg2"),
      bg: document.getElementById("bg"),
      palette: document.getElementById("palette"),
      paletteGrid: document.getElementById("paletteGrid"),
      gradient: document.getElementById("gradient"),
      finderStyle: document.getElementById("finderStyle"),
      finderGrid: document.getElementById("finderGrid"),
      shape: document.getElementById("shape"),
      shapePills: document.getElementById("shapePills"),
      size: document.getElementById("size"),
      sizeNumber: document.getElementById("sizeNumber"),
      sizePills: document.getElementById("sizePills"),
      margin: document.getElementById("margin"),
      marginPills: document.getElementById("marginPills"),
      logoSize: document.getElementById("logoSize"),
      logoSizeNumber: document.getElementById("logoSizeNumber"),
      logoSizePills: document.getElementById("logoSizePills"),
      showLogo: document.getElementById("showLogo"),
      logoFile: document.getElementById("logoFile"),
      logoFileButton: document.getElementById("logoFileButton"),
      logoFileName: document.getElementById("logoFileName"),
      logoText: document.getElementById("logoText"),
      showCaption: document.getElementById("showCaption"),
      captionText: document.getElementById("captionText"),
      captionStyle: document.getElementById("captionStyle"),
      captionSize: document.getElementById("captionSize"),
      captionSizeNumber: document.getElementById("captionSizeNumber"),
      png: document.getElementById("png"),
      svg: document.getElementById("svg"),
      reset: document.getElementById("reset"),
      canvas: document.getElementById("canvas"),
      status: document.getElementById("status"),
      limit: document.getElementById("limit")
    };

    const ctx = els.canvas.getContext("2d");
    const encoder = new TextEncoder();
    let current = null;
    let logoImage = null;
    let logoDataUrl = "";
    const palettes = {
      purpleMint: { fg: "#6d168f", fg2: "#6d168f", bg: "#e7f2de", gradient: "none", caption: "solid" },
      violetWhite: { fg: "#9d00d6", fg2: "#7c3aed", bg: "#ffffff", gradient: "linear", caption: "gradient" },
      sunsetLilac: { fg: "#ff8a18", fg2: "#b000d4", bg: "#e9e9fb", gradient: "linear", caption: "gradient" },
      ocean: { fg: "#0f766e", fg2: "#2563eb", bg: "#eefcff", gradient: "linear", caption: "gradient" },
      roseGold: { fg: "#e11d48", fg2: "#f59e0b", bg: "#fff7ed", gradient: "linear", caption: "gradient" },
      inkLime: { fg: "#10251f", fg2: "#84cc16", bg: "#f7fee7", gradient: "radial", caption: "gradient" },
      mono: { fg: "#111827", fg2: "#111827", bg: "#ffffff", gradient: "none", caption: "solid" },
      midnight: { fg: "#38bdf8", fg2: "#e879f9", bg: "#111827", gradient: "linear", caption: "rainbow" }
    };
    const paletteLabels = {
      purpleMint: "紫薄荷",
      violetWhite: "紫白",
      sunsetLilac: "橙粉紫",
      ocean: "海洋",
      roseGold: "玫瑰金",
      inkLime: "青柠",
      mono: "黑白",
      midnight: "霓虹"
    };
    const finderLabels = {
      rounded: "圆角",
      classic: "经典",
      circle: "圆环",
      dotTarget: "圆点",
      drop: "水滴",
      soft: "柔和"
    };
    const shapeLabels = {
      square: "方块",
      round: "圆角",
      dot: "圆点",
      diamond: "菱形"
    };
    const sizeOptions = { 512: "512", 1024: "1024" };
    const marginOptions = { 2: "S", 4: "M", 6: "L" };
    const logoSizeOptions = { 8: "S", 13: "M", 18: "L" };

    const gf = (() => {
      const exp = new Array(512).fill(0);
      const log = new Array(256).fill(0);
      let x = 1;
      for (let i = 0; i < 255; i++) {
        exp[i] = x;
        log[x] = i;
        x <<= 1;
        if (x & 0x100) x ^= 0x11d;
      }
      for (let i = 255; i < 512; i++) exp[i] = exp[i - 255];
      return { exp, log };
    })();

    function gfMul(a, b) {
      if (!a || !b) return 0;
      return gf.exp[gf.log[a] + gf.log[b]];
    }

    function rsGenerator(degree) {
      let poly = [1];
      for (let i = 0; i < degree; i++) {
        const next = new Array(poly.length + 1).fill(0);
        for (let j = 0; j < poly.length; j++) {
          next[j] ^= gfMul(poly[j], gf.exp[i]);
          next[j + 1] ^= poly[j];
        }
        poly = next;
      }
      return poly;
    }

    function reedSolomon(data, degree) {
      const gen = rsGenerator(degree);
      const out = new Array(degree).fill(0);
      for (const byte of data) {
        const factor = byte ^ out.shift();
        out.push(0);
        for (let i = 0; i < degree; i++) out[i] ^= gfMul(gen[i], factor);
      }
      return out;
    }

    function bitsToBytes(bits) {
      const bytes = [];
      for (let i = 0; i < bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8).join(""), 2));
      }
      return bytes;
    }

    function addBits(bits, value, length) {
      for (let i = length - 1; i >= 0; i--) bits.push((value >>> i) & 1);
    }

    function makeData(bytes, version) {
      const capacityBits = DATA_CODEWORDS[version] * 8;
      const bits = [];
      addBits(bits, 4, 4);
      addBits(bits, bytes.length, 8);
      for (const byte of bytes) addBits(bits, byte, 8);
      addBits(bits, 0, Math.min(4, capacityBits - bits.length));
      while (bits.length % 8) bits.push(0);
      const data = bitsToBytes(bits);
      const pads = [0xec, 0x11];
      for (let i = 0; data.length < DATA_CODEWORDS[version]; i++) data.push(pads[i % 2]);
      return data.concat(reedSolomon(data, ECC_CODEWORDS[version]));
    }

    function blankMatrix(size) {
      return {
        modules: Array.from({ length: size }, () => Array(size).fill(false)),
        reserved: Array.from({ length: size }, () => Array(size).fill(false))
      };
    }

    function setModule(qr, x, y, value, reserve = true) {
      if (x < 0 || y < 0 || y >= qr.modules.length || x >= qr.modules.length) return;
      qr.modules[y][x] = Boolean(value);
      if (reserve) qr.reserved[y][x] = true;
    }

    function drawFinder(qr, x, y) {
      for (let dy = -1; dy <= 7; dy++) {
        for (let dx = -1; dx <= 7; dx++) {
          const xx = x + dx;
          const yy = y + dy;
          const on = dx >= 0 && dx <= 6 && dy >= 0 && dy <= 6 &&
            (dx === 0 || dx === 6 || dy === 0 || dy === 6 || (dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4));
          setModule(qr, xx, yy, on);
        }
      }
    }

    function drawAlignment(qr, cx, cy) {
      for (let y = -2; y <= 2; y++) {
        for (let x = -2; x <= 2; x++) {
          const d = Math.max(Math.abs(x), Math.abs(y));
          setModule(qr, cx + x, cy + y, d !== 1);
        }
      }
    }

    function drawPatterns(qr, version) {
      const size = qr.modules.length;
      drawFinder(qr, 0, 0);
      drawFinder(qr, size - 7, 0);
      drawFinder(qr, 0, size - 7);
      for (let i = 8; i < size - 8; i++) {
        setModule(qr, i, 6, i % 2 === 0);
        setModule(qr, 6, i, i % 2 === 0);
      }
      for (const c of ALIGNMENT[version]) drawAlignment(qr, c, c);
      setModule(qr, 8, 4 * version + 9, true);
      for (let i = 0; i < 9; i++) {
        if (i !== 6) {
          setModule(qr, 8, i, false);
          setModule(qr, i, 8, false);
        }
      }
      for (let i = size - 8; i < size; i++) {
        setModule(qr, 8, i, false);
        setModule(qr, i, 8, false);
      }
    }

    function mask(maskId, x, y) {
      switch (maskId) {
        case 0: return (x + y) % 2 === 0;
        case 1: return y % 2 === 0;
        case 2: return x % 3 === 0;
        case 3: return (x + y) % 3 === 0;
        case 4: return (Math.floor(y / 2) + Math.floor(x / 3)) % 2 === 0;
        case 5: return ((x * y) % 2 + (x * y) % 3) === 0;
        case 6: return (((x * y) % 2 + (x * y) % 3) % 2) === 0;
        case 7: return (((x + y) % 2 + (x * y) % 3) % 2) === 0;
        default: return false;
      }
    }

    function placeData(qr, codewords, maskId) {
      const bits = [];
      for (const byte of codewords) addBits(bits, byte, 8);
      const size = qr.modules.length;
      let bit = 0;
      let direction = -1;
      for (let x = size - 1; x > 0; x -= 2) {
        if (x === 6) x--;
        for (let step = 0; step < size; step++) {
          const y = direction === -1 ? size - 1 - step : step;
          for (let dx = 0; dx < 2; dx++) {
            const xx = x - dx;
            if (!qr.reserved[y][xx]) {
              const value = bit < bits.length ? bits[bit++] === 1 : false;
              qr.modules[y][xx] = value !== mask(maskId, xx, y);
            }
          }
        }
        direction *= -1;
      }
    }

    function formatBits(maskId) {
      let data = (EC_BITS << 3) | maskId;
      let value = data << 10;
      const generator = 0x537;
      for (let i = 14; i >= 10; i--) {
        if ((value >>> i) & 1) value ^= generator << (i - 10);
      }
      return ((data << 10) | value) ^ 0x5412;
    }

    function drawFormat(qr, maskId) {
      const size = qr.modules.length;
      const bits = formatBits(maskId);
      const coordsA = [[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[7,8],[8,8],[8,7],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0]];
      const coordsB = [[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],[8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
      for (let i = 0; i < 15; i++) {
        const on = ((bits >>> i) & 1) === 1;
        setModule(qr, coordsA[i][0], coordsA[i][1], on);
        setModule(qr, coordsB[i][0], coordsB[i][1], on);
      }
    }

    function penalty(modules) {
      const size = modules.length;
      let score = 0;
      for (let y = 0; y < size; y++) {
        let runColor = modules[y][0];
        let run = 1;
        for (let x = 1; x < size; x++) {
          if (modules[y][x] === runColor) run++;
          else {
            if (run >= 5) score += 3 + run - 5;
            runColor = modules[y][x];
            run = 1;
          }
        }
        if (run >= 5) score += 3 + run - 5;
      }
      for (let x = 0; x < size; x++) {
        let runColor = modules[0][x];
        let run = 1;
        for (let y = 1; y < size; y++) {
          if (modules[y][x] === runColor) run++;
          else {
            if (run >= 5) score += 3 + run - 5;
            runColor = modules[y][x];
            run = 1;
          }
        }
        if (run >= 5) score += 3 + run - 5;
      }
      for (let y = 0; y < size - 1; y++) {
        for (let x = 0; x < size - 1; x++) {
          const c = modules[y][x];
          if (c === modules[y][x + 1] && c === modules[y + 1][x] && c === modules[y + 1][x + 1]) score += 3;
        }
      }
      const pattern = "10111010000";
      const reverse = "00001011101";
      for (let y = 0; y < size; y++) {
        const row = modules[y].map(Boolean).map(v => v ? "1" : "0").join("");
        for (let i = 0; i <= size - 11; i++) {
          const chunk = row.slice(i, i + 11);
          if (chunk === pattern || chunk === reverse) score += 40;
        }
      }
      for (let x = 0; x < size; x++) {
        let col = "";
        for (let y = 0; y < size; y++) col += modules[y][x] ? "1" : "0";
        for (let i = 0; i <= size - 11; i++) {
          const chunk = col.slice(i, i + 11);
          if (chunk === pattern || chunk === reverse) score += 40;
        }
      }
      const dark = modules.flat().filter(Boolean).length;
      score += Math.floor(Math.abs((dark * 100 / (size * size)) - 50) / 5) * 10;
      return score;
    }

    function cloneQr(qr) {
      return {
        modules: qr.modules.map(row => row.slice()),
        reserved: qr.reserved.map(row => row.slice())
      };
    }

    function createQr(text) {
      const bytes = [...encoder.encode(text)];
      const version = BYTE_CAPACITY.findIndex((cap, i) => i > 0 && bytes.length <= cap);
      if (version < 1) throw new Error("内容太长，当前紧凑版本放不下。");
      const base = blankMatrix(17 + 4 * version);
      drawPatterns(base, version);
      const codewords = makeData(bytes, version);
      let best = null;
      for (let maskId = 0; maskId < 8; maskId++) {
        const candidate = cloneQr(base);
        placeData(candidate, codewords, maskId);
        drawFormat(candidate, maskId);
        const score = penalty(candidate.modules);
        if (!best || score < best.score) best = { ...candidate, maskId, score, version, bytes: bytes.length };
      }
      return best;
    }

    function makePaint(imageSize) {
      if (els.gradient.value === "linear") {
        const gradient = ctx.createLinearGradient(0, 0, imageSize, imageSize);
        gradient.addColorStop(0, els.fg.value);
        gradient.addColorStop(1, els.fg2.value);
        return gradient;
      }
      if (els.gradient.value === "radial") {
        const gradient = ctx.createRadialGradient(imageSize / 2, imageSize / 2, imageSize * 0.08, imageSize / 2, imageSize / 2, imageSize * 0.66);
        gradient.addColorStop(0, els.fg2.value);
        gradient.addColorStop(1, els.fg.value);
        return gradient;
      }
      return els.fg.value;
    }

    function roundedRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.lineTo(x + width - r, y);
      context.quadraticCurveTo(x + width, y, x + width, y + r);
      context.lineTo(x + width, y + height - r);
      context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      context.lineTo(x + r, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - r);
      context.lineTo(x, y + r);
      context.quadraticCurveTo(x, y, x + r, y);
      context.closePath();
    }

    function drawModule(x, y, scale, shape) {
      if (shape === "dot") {
        ctx.beginPath();
        ctx.arc(x + scale / 2, y + scale / 2, scale * 0.43, 0, Math.PI * 2);
        ctx.fill();
      } else if (shape === "diamond") {
        ctx.beginPath();
        ctx.moveTo(x + scale / 2, y + scale * 0.08);
        ctx.lineTo(x + scale * 0.92, y + scale / 2);
        ctx.lineTo(x + scale / 2, y + scale * 0.92);
        ctx.lineTo(x + scale * 0.08, y + scale / 2);
        ctx.closePath();
        ctx.fill();
      } else if (shape === "round") {
        roundedRect(ctx, x + scale * 0.06, y + scale * 0.06, scale * 0.88, scale * 0.88, scale * 0.24);
        ctx.fill();
      } else {
        ctx.fillRect(x, y, scale, scale);
      }
    }

    function finderOrigin(qrSize, fx, fy) {
      const max = qrSize - 7;
      if (fx < 7 && fy < 7) return [0, 0];
      if (fx >= max && fy < 7) return [max, 0];
      if (fx < 7 && fy >= max) return [0, max];
      return null;
    }

    function isFinderModule(qrSize, x, y) {
      return Boolean(finderOrigin(qrSize, x, y));
    }

    function drawDropPath(context, x, y, size, rotate) {
      const cx = x + size / 2;
      const cy = y + size / 2;
      context.save();
      context.translate(cx, cy);
      context.rotate(rotate);
      context.beginPath();
      context.moveTo(size * 0.38, -size * 0.5);
      context.bezierCurveTo(size * 0.08, -size * 0.5, -size * 0.5, -size * 0.36, -size * 0.5, size * 0.06);
      context.bezierCurveTo(-size * 0.5, size * 0.42, -size * 0.22, size * 0.5, size * 0.05, size * 0.5);
      context.bezierCurveTo(size * 0.42, size * 0.5, size * 0.5, size * 0.18, size * 0.5, -size * 0.14);
      context.lineTo(size * 0.5, -size * 0.5);
      context.closePath();
      context.restore();
    }

    function finderDropRotation(moduleX, moduleY) {
      if (moduleX > moduleY) return Math.PI;
      if (moduleX < moduleY) return 0;
      return Math.PI / 2;
    }

    function drawFinderAt(moduleX, moduleY, scale, style) {
      const x = moduleX * scale;
      const y = moduleY * scale;
      const s = scale * 7;
      ctx.save();
      if (style === "circle" || style === "dotTarget") {
        const cx = x + s / 2;
        const cy = y + s / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, s * 0.49, 0, Math.PI * 2);
        ctx.arc(cx, cy, s * 0.34, 0, Math.PI * 2, true);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, style === "dotTarget" ? s * 0.23 : s * 0.2, 0, Math.PI * 2);
        ctx.fill();
      } else if (style === "drop") {
        const rotation = finderDropRotation(moduleX, moduleY);
        drawDropPath(ctx, x, y, s, rotation);
        ctx.fill();
        ctx.fillStyle = els.bg.value;
        drawDropPath(ctx, x + s * 0.17, y + s * 0.17, s * 0.66, rotation);
        ctx.fill();
        ctx.fillStyle = makePaint(els.canvas.width);
        drawDropPath(ctx, x + s * 0.31, y + s * 0.31, s * 0.38, rotation);
        ctx.fill();
      } else {
        const radius = style === "classic" ? 0 : style === "soft" ? s * 0.32 : s * 0.2;
        roundedRect(ctx, x, y, s, s, radius);
        ctx.fill();
        ctx.fillStyle = els.bg.value;
        roundedRect(ctx, x + scale, y + scale, s - scale * 2, s - scale * 2, radius * 0.72);
        ctx.fill();
        ctx.fillStyle = makePaint(els.canvas.width);
        roundedRect(ctx, x + scale * 2, y + scale * 2, s - scale * 4, s - scale * 4, radius * 0.46);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawLogo(imageSize) {
      const percent = Number(els.logoSize.value);
      if (!els.showLogo.checked || percent <= 0) return;
      const logoBox = Math.round(imageSize * (percent / 100));
      if (logoBox < 18) return;
      const pad = Math.round(logoBox * 0.1);
      const outer = logoBox + pad;
      const x = Math.round((imageSize - outer) / 2);
      const y = Math.round((imageSize - outer) / 2);
      ctx.save();
      ctx.fillStyle = els.bg.value;
      roundedRect(ctx, x, y, outer, outer, Math.max(8, outer * 0.16));
      ctx.fill();
      ctx.strokeStyle = "rgba(22, 33, 31, 0.14)";
      ctx.lineWidth = Math.max(1, imageSize / 256);
      ctx.stroke();

      const inner = outer - pad * 2;
      const ix = x + pad;
      const iy = y + pad;
      if (logoImage) {
        roundedRect(ctx, ix, iy, inner, inner, Math.max(6, inner * 0.14));
        ctx.clip();
        ctx.drawImage(logoImage, ix, iy, inner, inner);
      } else {
        const text = (els.logoText.value || "LOGO").trim().slice(0, 8);
        ctx.fillStyle = makePaint(imageSize);
        ctx.font = `800 ${Math.max(11, Math.floor(inner / Math.max(2.5, text.length * 0.72)))}px Inter, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, imageSize / 2, imageSize / 2);
      }
      ctx.restore();
    }

    function makeCaptionPaint(width) {
      if (els.captionStyle.value === "solid") return els.fg.value;
      if (els.captionStyle.value === "rainbow") {
        const gradient = ctx.createLinearGradient(0, 0, width, 0);
        gradient.addColorStop(0, "#ef4444");
        gradient.addColorStop(0.22, "#f59e0b");
        gradient.addColorStop(0.44, "#10b981");
        gradient.addColorStop(0.66, "#3b82f6");
        gradient.addColorStop(0.84, "#8b5cf6");
        gradient.addColorStop(1, "#ec4899");
        return gradient;
      }
      return makePaint(width);
    }

    function fitCaptionFont(text, maxWidth, maxSize, minSize) {
      let size = maxSize;
      do {
        ctx.font = `850 ${size}px Inter, sans-serif`;
        if (ctx.measureText(text).width <= maxWidth || size <= minSize) return size;
        size -= 1;
      } while (size > minSize);
      return minSize;
    }

    function splitCaptionLines(text, maxWidth, fontSize) {
      const manual = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
      if (manual.length > 1) {
        return [manual[0], manual.slice(1).join(" ")].filter(Boolean).slice(0, 2);
      }
      const clean = text.replace(/\s+/g, " ").trim();
      if (!clean) return [];
      ctx.font = `850 ${fontSize}px Inter, sans-serif`;
      if (ctx.measureText(clean).width <= maxWidth) return [clean];

      const breakChars = " ，,。.!！?？、;；:：-";
      let best = 1;
      let bestScore = Infinity;
      for (let i = 1; i < clean.length; i++) {
        const left = clean.slice(0, i).trim();
        const right = clean.slice(i).trim();
        if (!left || !right) continue;
        const leftWidth = ctx.measureText(left).width;
        const rightWidth = ctx.measureText(right).width;
        const overflow = Math.max(0, leftWidth - maxWidth) + Math.max(0, rightWidth - maxWidth);
        const balance = Math.abs(leftWidth - rightWidth) / maxWidth;
        const breakBonus = breakChars.includes(clean[i - 1]) || breakChars.includes(clean[i]) ? -0.35 : 0;
        const score = overflow * 10 + balance + breakBonus;
        if (score < bestScore) {
          bestScore = score;
          best = i;
        }
      }
      return [clean.slice(0, best).trim(), clean.slice(best).trim()].filter(Boolean).slice(0, 2);
    }

    function fitCaptionLines(text, maxWidth, maxSize, minSize) {
      let size = maxSize;
      do {
        const lines = splitCaptionLines(text, maxWidth, size);
        ctx.font = `850 ${size}px Inter, sans-serif`;
        const fits = lines.every(line => ctx.measureText(line).width <= maxWidth);
        if (fits || size <= minSize) return { size, lines };
        size -= 1;
      } while (size > minSize);
      return { size: minSize, lines: splitCaptionLines(text, maxWidth, minSize) };
    }

    function drawCaption(qrImageSize, captionHeight) {
      if (!els.showCaption.checked) return;
      const text = (els.captionText.value || "").trim();
      if (!text || captionHeight <= 0) return;
      ctx.save();
      ctx.fillStyle = makeCaptionPaint(els.canvas.width);
      const maxWidth = els.canvas.width * 0.86;
      const requestedSize = Number(els.captionSize.value) || 28;
      const fitted = fitCaptionLines(text, maxWidth, Math.min(requestedSize, Math.floor(captionHeight * 0.43)), 12);
      const fontSize = fitted.size;
      const lines = fitted.lines.slice(0, 2);
      ctx.font = `850 ${fontSize}px Inter, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const lineHeight = fontSize * 1.12;
      const centerY = qrImageSize + captionHeight * 0.43;
      const firstY = centerY - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, index) => {
        ctx.fillText(line, els.canvas.width / 2, firstY + index * lineHeight);
      });
      ctx.restore();
    }

    function draw(qr) {
      const size = Number(els.size.value);
      const margin = Number(els.margin.value);
      const moduleCount = qr.modules.length + margin * 2;
      const scale = Math.floor(size / moduleCount);
      const imageSize = scale * moduleCount;
      const caption = els.showCaption.checked ? (els.captionText.value || "").trim() : "";
      const captionSize = Number(els.captionSize.value) || 28;
      const estimatedLines = caption && (caption.includes("\n") || caption.length > 16) ? 2 : 1;
      const captionHeight = caption ? Math.max(Math.round(imageSize * 0.13), Math.round(captionSize * (estimatedLines === 2 ? 2.45 : 1.55)), 42) : 0;
      els.canvas.width = imageSize;
      els.canvas.height = imageSize + captionHeight;
      ctx.fillStyle = els.bg.value;
      ctx.fillRect(0, 0, els.canvas.width, els.canvas.height);
      ctx.fillStyle = makePaint(imageSize);
      const shape = els.shape.value;
      const finderStyle = els.finderStyle.value;
      for (let y = 0; y < qr.modules.length; y++) {
        for (let x = 0; x < qr.modules.length; x++) {
          if (qr.modules[y][x] && !isFinderModule(qr.modules.length, x, y)) {
            drawModule((x + margin) * scale, (y + margin) * scale, scale, shape);
          }
        }
      }
      ctx.fillStyle = makePaint(imageSize);
      drawFinderAt(margin, margin, scale, finderStyle);
      drawFinderAt(margin + qr.modules.length - 7, margin, scale, finderStyle);
      drawFinderAt(margin, margin + qr.modules.length - 7, scale, finderStyle);
      drawLogo(imageSize);
      drawCaption(imageSize, captionHeight);
    }

    function svgMarkup(qr) {
      const margin = Number(els.margin.value);
      const qrModules = qr.modules.length + margin * 2;
      const captionText = els.showCaption.checked ? (els.captionText.value || "").trim() : "";
      const captionSizePx = Number(els.captionSize.value) || 28;
      const estimatedLines = captionText && (captionText.includes("\n") || captionText.length > 16) ? 2 : 1;
      const captionHeight = captionText ? Math.max(qrModules * 0.13, qrModules * (captionSizePx / Number(els.size.value)) * (estimatedLines === 2 ? 2.45 : 1.55), 2.5) : 0;
      const modules = qrModules;
      const totalHeight = qrModules + captionHeight;
      const rects = [];
      const fill = els.gradient.value === "none" ? els.fg.value : "url(#qrGradient)";
      let defs = els.gradient.value === "radial"
        ? `<radialGradient id="qrGradient" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="${els.fg2.value}"/><stop offset="100%" stop-color="${els.fg.value}"/></radialGradient>`
        : els.gradient.value === "linear"
          ? `<linearGradient id="qrGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${els.fg.value}"/><stop offset="100%" stop-color="${els.fg2.value}"/></linearGradient>`
          : "";
      if (captionText && els.captionStyle.value === "gradient") {
        defs += `<linearGradient id="captionGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${els.fg.value}"/><stop offset="100%" stop-color="${els.fg2.value}"/></linearGradient>`;
      }
      if (captionText && els.captionStyle.value === "rainbow") {
        defs += `<linearGradient id="captionGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ef4444"/><stop offset="22%" stop-color="#f59e0b"/><stop offset="44%" stop-color="#10b981"/><stop offset="66%" stop-color="#3b82f6"/><stop offset="84%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>`;
      }
      defs = defs ? `<defs>${defs}</defs>` : "";
      const shape = els.shape.value;
      for (let y = 0; y < qr.modules.length; y++) {
        for (let x = 0; x < qr.modules.length; x++) {
          if (!qr.modules[y][x]) continue;
          if (isFinderModule(qr.modules.length, x, y)) continue;
          const xx = x + margin;
          const yy = y + margin;
          if (shape === "dot") rects.push(`<circle cx="${xx + 0.5}" cy="${yy + 0.5}" r="0.43"/>`);
          else if (shape === "diamond") rects.push(`<path d="M${xx + 0.5} ${yy + 0.08}L${xx + 0.92} ${yy + 0.5}L${xx + 0.5} ${yy + 0.92}L${xx + 0.08} ${yy + 0.5}Z"/>`);
          else if (shape === "round") rects.push(`<rect x="${xx + 0.06}" y="${yy + 0.06}" width="0.88" height="0.88" rx="0.24"/>`);
          else rects.push(`<rect x="${xx}" y="${yy}" width="1" height="1"/>`);
        }
      }
      function finderSvg(x, y, style) {
        if (style === "circle" || style === "dotTarget") {
          const r = style === "dotTarget" ? 1.62 : 1.4;
          return `<path d="M${x + 3.5} ${y + 0.05}a3.45 3.45 0 1 0 0.01 0M${x + 3.5} ${y + 1.15}a2.35 2.35 0 1 1 -0.01 0" fill-rule="evenodd"/><circle cx="${x + 3.5}" cy="${y + 3.5}" r="${r}"/>`;
        }
        if (style === "drop") {
          const drop = (dx, dy, s) => `M${dx + s * 0.88} ${dy}C${dx + s * 0.58} ${dy} ${dx} ${dy + s * 0.14} ${dx} ${dy + s * 0.56}C${dx} ${dy + s * 0.92} ${dx + s * 0.28} ${dy + s} ${dx + s * 0.55} ${dy + s}C${dx + s * 0.92} ${dy + s} ${dx + s} ${dy + s * 0.68} ${dx + s} ${dy + s * 0.36}L${dx + s} ${dy}Z`;
          const rotation = finderDropRotation(x, y) * 180 / Math.PI;
          return `<g transform="rotate(${rotation} ${x + 3.5} ${y + 3.5})"><path d="${drop(x, y, 7)}"/><path d="${drop(x + 1.19, y + 1.19, 4.62)}" fill="${els.bg.value}"/><path d="${drop(x + 2.17, y + 2.17, 2.66)}"/></g>`;
        }
        const rx = style === "classic" ? 0 : style === "soft" ? 2.2 : 1.35;
        return `<rect x="${x}" y="${y}" width="7" height="7" rx="${rx}"/><rect x="${x + 1}" y="${y + 1}" width="5" height="5" rx="${rx * 0.72}" fill="${els.bg.value}"/><rect x="${x + 2}" y="${y + 2}" width="3" height="3" rx="${rx * 0.46}"/>`;
      }
      const finderStyle = els.finderStyle.value;
      const finders = [
        finderSvg(margin, margin, finderStyle),
        finderSvg(margin + qr.modules.length - 7, margin, finderStyle),
        finderSvg(margin, margin + qr.modules.length - 7, finderStyle)
      ].join("");
      const logoPercent = Number(els.logoSize.value);
      let logo = "";
      if (els.showLogo.checked && logoPercent > 0) {
        const outer = modules * (logoPercent / 100) * 1.2;
        const x = (modules - outer) / 2;
        const y = (modules - outer) / 2;
        const text = (els.logoText.value || "LOGO").trim().slice(0, 8);
        const image = logoDataUrl ? `<image href="${logoDataUrl}" x="${x + outer * 0.09}" y="${y + outer * 0.09}" width="${outer * 0.82}" height="${outer * 0.82}" preserveAspectRatio="xMidYMid slice"/>` : "";
        const label = !logoDataUrl ? `<text x="${modules / 2}" y="${modules / 2}" dominant-baseline="middle" text-anchor="middle" font-family="Inter, sans-serif" font-size="${Math.max(1.4, outer / Math.max(2.4, text.length * 0.72))}" font-weight="800" fill="${fill}">${text.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]))}</text>` : "";
        logo = `<rect x="${x}" y="${y}" width="${outer}" height="${outer}" rx="${outer * 0.16}" fill="${els.bg.value}" stroke="rgba(22,33,31,.18)" stroke-width=".08"/>${image}${label}`;
      }
      let caption = "";
      if (captionText) {
        const captionFill = els.captionStyle.value === "solid" ? els.fg.value : "url(#captionGradient)";
        const requestedSvgSize = modules * (captionSizePx / Number(els.size.value));
        const maxCharsPerLine = Math.max(1, Math.floor((modules * 0.82) / Math.max(0.9, requestedSvgSize * 0.58)));
        const manualSvgLines = captionText.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        let svgLines = manualSvgLines.length > 1 ? [manualSvgLines[0], manualSvgLines.slice(1).join(" ")] : [captionText.replace(/\s+/g, " ").trim()];
        const svgSource = svgLines.join(" ");
        if (svgLines.length === 1 && svgSource.length > maxCharsPerLine) {
          let best = Math.ceil(svgSource.length / 2);
          const breakChars = " ，,。.!！?？、;；:：-";
          let bestScore = Infinity;
          for (let i = 1; i < svgSource.length; i++) {
            const left = svgSource.slice(0, i).trim();
            const right = svgSource.slice(i).trim();
            if (!left || !right) continue;
            const overflow = Math.max(0, left.length - maxCharsPerLine) + Math.max(0, right.length - maxCharsPerLine);
            const balance = Math.abs(left.length - right.length);
            const breakBonus = breakChars.includes(svgSource[i - 1]) || breakChars.includes(svgSource[i]) ? -4 : 0;
            const score = overflow * 20 + balance + breakBonus;
            if (score < bestScore) {
              bestScore = score;
              best = i;
            }
          }
          svgLines = [svgSource.slice(0, best).trim(), svgSource.slice(best).trim()].filter(Boolean).slice(0, 2);
        }
        const longest = svgLines.reduce((max, line) => Math.max(max, line.length), 1);
        const fontSize = Math.max(0.9, Math.min(requestedSvgSize, captionHeight * 0.43, (modules * 0.82) / Math.max(4, longest * 0.58)));
        const lineHeight = fontSize * 1.12;
        const centerY = qrModules + captionHeight * 0.43;
        const firstY = centerY - ((svgLines.length - 1) * lineHeight) / 2;
        const tspans = svgLines.map((line, index) => {
          const safeLine = line.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
          return `<tspan x="${modules / 2}" y="${firstY + index * lineHeight}">${safeLine}</tspan>`;
        }).join("");
        caption = `<text dominant-baseline="middle" text-anchor="middle" font-family="Inter, sans-serif" font-size="${fontSize}" font-weight="850" fill="${captionFill}">${tspans}</text>`;
      }
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${modules} ${totalHeight}">${defs}<rect width="100%" height="100%" fill="${els.bg.value}"/><g fill="${fill}">${rects.join("")}${finders}</g>${logo}${caption}</svg>`;
    }

    function downloadBlob(name, type, content) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.append(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function update() {
      const text = els.content.value || " ";
      const bytes = encoder.encode(text).length;
      els.limit.textContent = `${bytes} / ${BYTE_CAPACITY[4]} 字节`;
      els.limit.dataset.state = bytes > BYTE_CAPACITY[4] ? "warn" : "";
      try {
        current = createQr(text);
        draw(current);
        els.status.textContent = `已生成：版本 ${current.version}，${current.bytes} 字节`;
        els.png.disabled = false;
        els.svg.disabled = false;
      } catch (error) {
        current = null;
        ctx.clearRect(0, 0, els.canvas.width, els.canvas.height);
        els.status.textContent = "内容太长，请缩短文字或链接。";
        els.png.disabled = true;
        els.svg.disabled = true;
      }
    }

    function syncSize(fromNumber) {
      const value = Math.max(192, Math.min(1024, Number(fromNumber ? els.sizeNumber.value : els.size.value) || 512));
      els.size.value = value;
      els.sizeNumber.value = value;
      update();
    }

    function syncLogoSize(fromNumber) {
      const value = Math.max(0, Math.min(18, Number(fromNumber ? els.logoSizeNumber.value : els.logoSize.value) || 0));
      els.logoSize.value = value;
      els.logoSizeNumber.value = value;
      update();
    }

    function syncCaptionSize(fromNumber) {
      const value = Math.max(14, Math.min(72, Number(fromNumber ? els.captionSizeNumber.value : els.captionSize.value) || 28));
      els.captionSize.value = value;
      els.captionSizeNumber.value = value;
      update();
    }

    function applyPalette(name) {
      const palette = palettes[name];
      if (!palette) return;
      els.fg.value = palette.fg;
      els.fg2.value = palette.fg2;
      els.bg.value = palette.bg;
      els.gradient.value = palette.gradient;
      els.captionStyle.value = palette.caption;
      renderPaletteCards();
      renderFinderCards();
      update();
    }

    function markCustomPalette() {
      els.palette.value = "custom";
      renderPaletteCards();
    }

    function finderIcon(style) {
      if (style === "circle" || style === "dotTarget") {
        const core = style === "dotTarget" ? 7 : 6;
        return `<svg viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M16 1.5a14.5 14.5 0 1 0 0 29 14.5 14.5 0 0 0 0-29Zm0 5.2a9.3 9.3 0 1 1 0 18.6 9.3 9.3 0 0 1 0-18.6Z"/><circle cx="16" cy="16" r="${core}" fill="currentColor"/></svg>`;
      }
      if (style === "drop") {
        const drop = "M27 3C19 3 5 6.8 5 18.2C5 27.3 12.4 29 18.5 29C27.1 29 29 21.6 29 14V3Z";
        const inner = "M23 8C17.6 8 10 10.8 10 18C10 23.3 14.5 24 18.2 24C23.6 24 24 19.5 24 14.4V8Z";
        const core = "M20.8 12C17.5 12 14 13.7 14 18C14 20.6 16 21 18.4 21C20.9 21 21 18.8 21 15.9V12Z";
        return `<svg viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="${drop}"/><path fill="var(--f-bg)" d="${inner}"/><path fill="currentColor" d="${core}"/></svg>`;
      }
      const rx = style === "classic" ? 0 : style === "soft" ? 9 : 6;
      return `<svg viewBox="0 0 32 32" aria-hidden="true"><rect x="2" y="2" width="28" height="28" rx="${rx}" fill="currentColor"/><rect x="7" y="7" width="18" height="18" rx="${rx * 0.55}" fill="var(--f-bg)"/><rect x="12" y="12" width="8" height="8" rx="${rx * 0.25}" fill="currentColor"/></svg>`;
    }

    function renderPaletteCards() {
      els.paletteGrid.innerHTML = "";
      Object.entries(palettes).forEach(([key, palette]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-card";
        button.setAttribute("aria-pressed", String(els.palette.value === key));
        button.title = paletteLabels[key];
        button.setAttribute("aria-label", paletteLabels[key]);
        button.innerHTML = `<span class="palette-demo" style="--p-fg:${palette.fg};--p-fg2:${palette.fg2};"><span style="background:${palette.bg}"></span><span style="background:${palette.fg}"></span></span>`;
        button.addEventListener("click", () => {
          els.palette.value = key;
          applyPalette(key);
        });
        els.paletteGrid.append(button);
      });
    }

    function renderFinderCards() {
      els.finderGrid.innerHTML = "";
      Object.entries(finderLabels).forEach(([key, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-card";
        button.setAttribute("aria-pressed", String(els.finderStyle.value === key));
        button.innerHTML = `<span class="finder-demo" style="--f-bg:${els.bg.value};color:${els.fg.value}">${finderIcon(key)}</span><span>${label}</span>`;
        button.addEventListener("click", () => {
          els.finderStyle.value = key;
          renderFinderCards();
          update();
        });
        els.finderGrid.append(button);
      });
    }

    function renderShapePills() {
      els.shapePills.innerHTML = "";
      Object.entries(shapeLabels).forEach(([key, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "pill-button";
        button.setAttribute("aria-pressed", String(els.shape.value === key));
        button.textContent = label;
        button.addEventListener("click", () => {
          els.shape.value = key;
          renderShapePills();
          update();
        });
        els.shapePills.append(button);
      });
    }

    function renderValuePills(container, options, selectedValue, onPick) {
      container.innerHTML = "";
      Object.entries(options).forEach(([value, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "pill-button";
        button.setAttribute("aria-pressed", String(String(selectedValue) === String(value)));
        button.textContent = label;
        button.addEventListener("click", () => onPick(value));
        container.append(button);
      });
    }

    function renderSizePills() {
      renderValuePills(els.sizePills, sizeOptions, els.size.value, value => {
        els.size.value = value;
        els.sizeNumber.value = value;
        renderSizePills();
        update();
      });
    }

    function renderMarginPills() {
      renderValuePills(els.marginPills, marginOptions, els.margin.value, value => {
        els.margin.value = value;
        renderMarginPills();
        update();
      });
    }

    function renderLogoSizePills() {
      renderValuePills(els.logoSizePills, logoSizeOptions, els.logoSize.value, value => {
        els.logoSize.value = value;
        els.logoSizeNumber.value = value;
        renderLogoSizePills();
        update();
      });
    }

    els.content.addEventListener("input", update);
    els.fg.addEventListener("input", () => { markCustomPalette(); renderFinderCards(); update(); });
    els.fg2.addEventListener("input", () => { markCustomPalette(); update(); });
    els.bg.addEventListener("input", () => { markCustomPalette(); renderFinderCards(); update(); });
    els.palette.addEventListener("change", () => applyPalette(els.palette.value));
    els.gradient.addEventListener("change", update);
    els.finderStyle.addEventListener("change", () => { renderFinderCards(); update(); });
    els.shape.addEventListener("change", () => { renderShapePills(); update(); });
    els.margin.addEventListener("change", () => { renderMarginPills(); update(); });
    els.showLogo.addEventListener("change", update);
    els.logoText.addEventListener("input", update);
    els.showCaption.addEventListener("change", update);
    els.captionText.addEventListener("input", update);
    els.captionStyle.addEventListener("change", update);
    els.captionSize.addEventListener("input", () => syncCaptionSize(false));
    els.captionSizeNumber.addEventListener("input", () => syncCaptionSize(true));
    els.size.addEventListener("change", () => { renderSizePills(); update(); });
    els.sizeNumber.addEventListener("change", () => { renderSizePills(); update(); });
    els.logoSize.addEventListener("change", () => { renderLogoSizePills(); update(); });
    els.logoSizeNumber.addEventListener("change", () => { renderLogoSizePills(); update(); });
    els.logoFileButton.addEventListener("click", () => els.logoFile.click());
    els.logoFileButton.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        els.logoFile.click();
      }
    });
    els.logoFile.addEventListener("change", () => {
      const file = els.logoFile.files && els.logoFile.files[0];
      if (!file) {
        logoImage = null;
        logoDataUrl = "";
        els.logoFileName.textContent = "未选择图片";
        update();
        return;
      }
      els.logoFileName.textContent = file.name || "已选择图片";
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        logoDataUrl = String(reader.result || "");
        const image = new Image();
        image.addEventListener("load", () => {
          logoImage = image;
          update();
        });
        image.src = logoDataUrl;
      });
      reader.readAsDataURL(file);
    });
    els.png.addEventListener("click", () => {
      if (!current) return;
      const a = document.createElement("a");
      a.href = els.canvas.toDataURL("image/png");
      a.download = "qr-code.png";
      a.click();
    });
    els.svg.addEventListener("click", () => {
      if (current) downloadBlob("qr-code.svg", "image/svg+xml", svgMarkup(current));
    });
    els.reset.addEventListener("click", () => {
      els.content.value = "https://example.com";
      els.palette.value = "custom";
      els.fg.value = "#111827";
      els.fg2.value = "#14b8a6";
      els.bg.value = "#ffffff";
      els.gradient.value = "linear";
      els.finderStyle.value = "rounded";
      els.shape.value = "round";
      els.size.value = "512";
      els.sizeNumber.value = "512";
      els.margin.value = "4";
      els.logoSize.value = "13";
      els.logoSizeNumber.value = "13";
      els.showLogo.checked = true;
      els.logoText.value = "LOGO";
      els.showCaption.checked = true;
      els.captionText.value = "扫码进入";
      els.captionStyle.value = "gradient";
      els.captionSize.value = "28";
      els.captionSizeNumber.value = "28";
      els.logoFile.value = "";
      els.logoFileName.textContent = "未选择图片";
      logoImage = null;
      logoDataUrl = "";
      renderPaletteCards();
      renderFinderCards();
      renderShapePills();
      renderSizePills();
      renderMarginPills();
      renderLogoSizePills();
      update();
    });

    renderPaletteCards();
    renderFinderCards();
    renderShapePills();
    renderSizePills();
    renderMarginPills();
    renderLogoSizePills();
    update();
  </script>
</body>
</html>
