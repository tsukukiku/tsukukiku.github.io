  <meta name="theme-color" content="#10131b" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .language-switcher a {
      min-height: 34px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: #f8f2e7;
      background: rgba(16, 19, 27, 0.28);
      padding: 0 12px;
      text-decoration: none;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    .language-switcher a:hover,
    .language-switcher a:focus-visible {
      border-color: rgba(229, 183, 101, 0.82);
      color: #e5b765;
      outline: none;
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5940567227813698" crossorigin="anonymous"></script>
</head>
<body>
  <div class="zodiac-background-grid" aria-hidden="true">
    <img src="zodiac-backgrounds/aries-background.png" alt="" />
    <img src="zodiac-backgrounds/taurus-background.png" alt="" />
    <img src="zodiac-backgrounds/gemini-background.png" alt="" />
    <img src="zodiac-backgrounds/cancer-background.png" alt="" />
    <img src="zodiac-backgrounds/leo-background.png" alt="" />
    <img src="zodiac-backgrounds/virgo-background.png" alt="" />
    <img src="zodiac-backgrounds/libra-background.png" alt="" />
    <img src="zodiac-backgrounds/scorpio-background.png" alt="" />
    <img src="zodiac-backgrounds/sagittarius-background.png" alt="" />
    <img src="zodiac-backgrounds/capricorn-background.png" alt="" />
    <img src="zodiac-backgrounds/aquarius-background.png" alt="" />
    <img src="zodiac-backgrounds/pisces-background.png" alt="" />
  </div>

  <main class="app-shell">
    <div class="top-actions">
      <a class="home-link" href="../index.html">返回首页</a>
      <nav class="language-switcher" aria-label="Language">
        <a href="../../cn/zodiac/index.html">CN</a>
        <a href="../../en/zodiac/index.html">EN</a>
        <a href="../../ja/zodiac/index.html">JA</a>
        <a href="../../ko/zodiac/index.html">KO</a>
        <a href="../../zh/zodiac/index.html">ZH</a>
      </nav>
    </div>

    <section class="sky-panel">
      <div class="sky-art" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <header class="masthead">
        <p class="eyebrow">Horoscope Analysis</p>
        <h1>星座月运势</h1>
        <p class="lead">选择年份、月份，再点击星座图标查看五项重点运势。</p>
      </header>
      <div class="controls">
        <label>
          <span>年份</span>
          <select id="yearSelect"></select>
        </label>
        <label>
          <span>月份</span>
          <select id="monthSelect"></select>
        </label>
      </div>
    </section>

    <section class="zodiac-section">
      <div class="section-heading">
        <h2>选择星座</h2>
        <p id="currentPeriod"></p>
      </div>
      <div class="zodiac-grid" id="zodiacGrid"></div>
    </section>

    <section class="reading-panel" id="readingPanel" aria-live="polite">
      <div class="reading-title">
        <div class="selected-symbol" id="selectedSymbol"></div>
        <div>
          <p id="selectedDates"></p>
          <h2 id="selectedName"></h2>
        </div>
      </div>

      <section class="card-draw">
        <div>
          <h3>精美运势解说卡</h3>
          <p id="cardHint">点击按钮，可显示此星座本月的运势图片。</p>
        </div>
        <button class="draw-button" id="drawCardButton" type="button">抽卡</button>
        <figure class="card-result" id="cardResult" hidden>
          <button class="close-card-button" id="closeCardButton" type="button">关闭</button>
          <img id="fortuneCardImage" src="" alt="" />
          <figcaption id="cardCaption"></figcaption>
          <a class="download-card-button" id="downloadCardButton" href="#" download>下载图片</a>
        </figure>
      </section>

      <article class="month-note" id="monthOverview" hidden></article>
      <ol class="fortune-list" id="fortuneList"></ol>
      <article class="month-note conclusion-note" id="monthConclusion" hidden></article>
    </section>
  </main>

  <script src="/analytics.js"></script>
  <script src="app.js?v=20260601"></script>
</body>
</html>
