<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 英语课文极速背诵助手</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-warning { background-color: #e67e22; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #displayArea {
            font-size: 18px;
            line-height: 1.8;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            min-height: 100px;
        }
        .blur {
            background-color: #dfe6e9;
            color: #dfe6e9;
            border-bottom: 2px solid #b2bec3;
            padding: 0 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .blur:hover { background-color: #ffeaa7; color: #333; }
        .hint-text { color: #7f8c8d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>⚡ 英语课文极速背诵助手</h1>
    
    <!-- 输入区域 -->
    <div class="card">
        <h3>1. 粘贴你需要背诵的英文课文：</h3>
        <textarea id="textInput" placeholder="在这里粘贴英文课文...例如：&#10;To be, or not to be, that is the question."></textarea>
        <div class="btn-group">
            <button class="btn-primary" onclick="initText()">🔄 载入/重置课文</button>
        </div>
    </div>

    <!-- 互动背诵区域 -->
    <div class="card">
        <h3>2. 互动背诵模式（点击灰色遮罩可偷看单词）：</h3>
        <div id="displayArea">在上方输入课文并点击载入...</div>
        <p class="hint-text">💡 鼠标悬停或点击灰色遮罩可以临时显示该单词。</p>
        
        <div class="btn-group">
            <button class="btn-success" onclick="modeFirstLetter()">🔤 模式一：首字母提示</button>
            <button class="btn-warning" onclick="modeRandomBlank()">🎲 模式二：50% 随机挖空</button>
            <button class="btn-danger" onclick="modeFullBlind()">🙈 模式三：全盲模式</button>
        </div>
    </div>

    <script>
        let originalText = "";

        function initText() {
            originalText = document.getElementById('textInput').value.trim();
            if (!originalText) {
                alert("请先输入一些英文内容！");
                return;
            }
            document.getElementById('displayArea').innerText = originalText;
        }

        // 模式一：保留首字母，其余字母变成下划线
        function modeFirstLetter() {
            if (!originalText) return alert("请先载入课文");
            // 匹配单词
            let result = originalText.replace(/[a-zA-Z]+/g, function(word) {
                if (word.length <= 1) return word;
                return word[0] + "_".repeat(word.length - 1);
            });
            document.getElementById('displayArea').innerText = result;
        }

        // 模式二：随机 50% 的单词变成遮罩
        function modeRandomBlank() {
            if (!originalText) return alert("请先载入课文");
            let result = originalText.replace(/[a-zA-Z]+/g, function(word) {
                if (Math.random() > 0.5) {
                    return `<span class="blur" title="${word}">${word}</span>`;
                }
                return word;
            });
            document.getElementById('displayArea').innerHTML = result;
        }

        // 模式三：所有单词全部变成遮罩
        function modeFullBlind() {
            if (!originalText) return alert("请先载入课文");
            let result = originalText.replace(/[a-zA-Z]+/g, function(word) {
                return `<span class="blur" title="${word}">${word}</span>`;
            });
            document.getElementById('displayArea').innerHTML = result;
        }
    </script>
</body>
</html>
