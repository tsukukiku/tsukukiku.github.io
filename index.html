  <style>
    :root {
      color-scheme: light;
      --ink: #17151f;
      --muted: #766c79;
      --line: rgba(27, 22, 34, 0.13);
      --gold: #b98a4d;
      --cream: #fffaf4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 105, 97, 0.20), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(77, 190, 218, 0.22), transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(247, 197, 87, 0.22), transparent 34%),
        linear-gradient(135deg, #fff3ec 0%, #eef7fb 48%, #f8eef7 100%);
    }

    .panel {
      width: min(920px, calc(100% - 32px));
      padding: clamp(24px, 4vw, 42px);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 24px 70px rgba(38, 31, 48, 0.22);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .brand-logo {
      width: 92px;
      height: 92px;
      display: block;
      margin: 0 auto 18px;
      border-radius: 26px;
      object-fit: cover;
      box-shadow: 0 14px 36px rgba(89, 62, 35, 0.20);
      filter: saturate(0.9) contrast(0.96) brightness(1.03);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.3rem, 6vw, 4.35rem);
      line-height: 1.08;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 800;
    }

    .subtitle {
      font-size: clamp(1rem, 2.2vw, 1.35rem);
    }

    .redirect-note {
      margin-top: 8px;
      font-size: clamp(1rem, 2.1vw, 1.2rem);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 24px 0 28px;
    }

    a {
      padding: 10px 17px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(12px);
      color: var(--ink);
      text-decoration: none;
      font-weight: 900;
    }

    a:hover,
    a:focus-visible {
      border-color: rgba(185, 138, 77, 0.58);
      color: #8a6539;
      outline: none;
    }

    .qr-card {
      width: min(280px, 72vw);
      margin: 0 auto;
      padding: 14px;
      border: 1px solid rgba(185, 138, 77, 0.30);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255, 250, 244, 0.92), rgba(246, 232, 222, 0.74));
      box-shadow: 0 16px 42px rgba(89, 62, 35, 0.16);
    }

    .qr-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      filter: saturate(0.88) contrast(0.98) brightness(1.03);
    }

    .qr-caption {
      margin: 10px 0 0;
      color: rgba(23, 21, 31, 0.58);
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 24px 18px;
        border-radius: 24px;
      }

      .brand-logo {
        width: 74px;
        height: 74px;
      }

      .qr-card {
        width: min(220px, 76vw);
      }
    }
  </style>

    <nav aria-label="Language links">

      <img src="assets/site-qrcode.png" alt="QR code for star-style-studio.net" />
      <p class="qr-caption">star-style-studio.net</p>
    </section>
  </main>
</body>
</html>
