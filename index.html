<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>星运占台：幸运站台 | Star Style Studio: Lucky Site | 星運占屋：ラッキーサイト</title>
  <meta name="description" content="星运占台：幸运站台 / Star Style Studio: Lucky Site / 星運占屋：ラッキーサイト。星座运势、手相命运、个人形象分析入口。" />
  <style>
    :root { color-scheme: light; --ink:#211b23; --muted:#665d66; --line:rgba(93,74,59,.22); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; background: linear-gradient(135deg,#d7c8ad,#b9c5d6 46%,#d4b4b9); }
    main { width:min(1120px, calc(100% - 28px)); margin:0 auto; padding:42px 0 34px; }
    .hero { text-align:center; margin-bottom:28px; }
    .hero h1 { margin:0; font-size:clamp(2.2rem, 7vw, 4.8rem); line-height:1.05; }
    .hero p { margin:.5rem 0 0; color:var(--muted); font-weight:700; }
    .title-dim { opacity:.5; font-size:.5em; font-weight:650; }
    .lang-row { display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin:18px 0 0; }
    .lang-row a { padding:8px 12px; border:1px solid var(--line); border-radius:999px; background:rgba(246,238,224,.72); color:var(--ink); text-decoration:none; font-weight:800; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:18px; }
    .card { min-height:390px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--line); border-radius:18px; overflow:hidden; background:rgba(231,220,204,.82); box-shadow:0 22px 62px rgba(61,43,56,.26); text-decoration:none; color:var(--ink); }
    .card:nth-child(1) { background:linear-gradient(160deg,rgba(224,218,207,.9),rgba(176,193,210,.94)); }
    .card:nth-child(2) { background:linear-gradient(160deg,rgba(224,211,183,.94),rgba(183,197,211,.9)); }
    .card:nth-child(3) { background:linear-gradient(160deg,rgba(202,178,139,.94),rgba(190,151,128,.92)); }
    .copy { padding:24px; }
    .copy h2 { margin:0; font-size:clamp(1.55rem,3vw,2.35rem); }
    .copy p { margin:.45rem 0 0; color:var(--muted); font-weight:800; }
    .enter { display:inline-flex; margin-top:18px; padding:9px 14px; border-radius:999px; background:rgba(33,27,35,.88); color:white; font-weight:900; }
    .covers { height:172px; overflow:hidden; border-top:1px solid var(--line); background:rgba(222,209,190,.58); }
    .track { display:flex; gap:8px; animation:slide 46s linear infinite; padding:10px; width:max-content; }
    .track img { height:148px; width:102px; object-fit:cover; border-radius:8px; box-shadow:0 8px 18px rgba(0,0,0,.16); background:rgba(255,255,255,.35); }
    .card:hover .track { animation-play-state:paused; }
    footer { text-align:center; color:var(--muted); font-weight:700; margin-top:24px; }
    @keyframes slide { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    @media(max-width:860px) { .grid { grid-template-columns:1fr; } .card { min-height:330px; } }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>星运占台<span class="title-dim">：幸运站台</span></h1>
      <p>Star Style Studio<span class="title-dim">: Lucky Site</span></p>
      <p>星運占屋<span class="title-dim">：ラッキーサイト</span></p>
      <div class="lang-row">
        <a href="cn/index.html">CN 简体</a>
        <a href="en/index.html">EN</a>
        <a href="ja/index.html">JA 日本語</a>
        <a href="ko/index.html">KO 한국어</a>
        <a href="zh/index.html">ZH 繁體</a>
      </div>
    </section>
    <section class="grid">
      <a class="card" href="zodiac/index.html">
        <div class="copy"><h2>星座运势分析</h2><p>Horoscope Analysis / 占星術リーディング</p><span class="enter">进入 / Enter</span></div>
        <div class="covers"><div class="track" data-folder="zodiac-covers" data-prefix="Zodiac" data-count="37"></div></div>
      </a>
      <a class="card" href="palm/index.html">
        <div class="copy"><h2>手相命运分析</h2><p>Palm Reading & Fate Analysis / 手相鑑定</p><span class="enter">进入 / Enter</span></div>
        <div class="covers"><div class="track" data-folder="palm-covers" data-prefix="palm" data-count="25"></div></div>
      </a>
      <a class="card" href="hair/index.html">
        <div class="copy"><h2>个人形象分析</h2><p>Personal Style Analysis / パーソナルスタイル診断</p><span class="enter">进入 / Enter</span></div>
        <div class="covers"><div class="track" data-folder="hair-covers" data-prefix="hair" data-count="36"></div></div>
      </a>
    </section>
    <footer>Email: openclawtellme(at)gmail.com</footer>
  </main>
  <script src="/analytics.js"></script>
  <script>
    document.querySelectorAll('.track').forEach((track) => {
      const folder = track.dataset.folder;
      const prefix = track.dataset.prefix;
      const count = Number(track.dataset.count || 0);
      const build = () => Array.from({ length: count }, (_, index) => {
        const number = String(index + 1).padStart(2, '0');
        return '<img src="' + folder + '/' + prefix + number + '.webp" alt="" loading="lazy" onerror="this.remove()" />';
      }).join('');
      track.innerHTML = build() + build();
    });
  </script>
</body>
</html>
