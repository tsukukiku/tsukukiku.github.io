<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>星运占台：幸运站台 | Star Style Studio: Lucky Site</title>
  <meta name="description" content="Star Style Studio language gateway for horoscope, palm reading, and personal style analysis." />
  <link rel="icon" type="image/png" href="assets/site-logo.png" />
  <link rel="apple-touch-icon" href="assets/site-logo.png" />
  <script src="/analytics.js"></script>
  <script>
    (function () {
      var languages = navigator.languages || [navigator.language || ""];
      var lang = languages.join(",").toLowerCase();
      var base = location.protocol === "file:" ? "" : "/";
      var target = base + "en/index.html";

      if (lang.indexOf("zh-tw") !== -1 || lang.indexOf("zh-hk") !== -1 || lang.indexOf("zh-mo") !== -1 || lang.indexOf("zh-hant") !== -1) {
        target = base + "zh/index.html";
      } else if (lang.indexOf("zh") !== -1) {
        target = base + "cn/index.html";
      } else if (lang.indexOf("ja") !== -1) {
        target = base + "ja/index.html";
      } else if (lang.indexOf("ko") !== -1) {
        target = base + "ko/index.html";
      }

      window.setTimeout(function () {
        location.replace(target);
      }, 900);
    }());
  </script>
  <style>
    :root{color-scheme:light;--ink:#17151f;--muted:#6d6270;--line:rgba(27,22,34,.13);--gold:#b98a4d;--cream:#fffaf4}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei","Noto Sans CJK SC",sans-serif;background:radial-gradient(circle at 12% 10%,rgba(255,105,97,.22),transparent 28%),radial-gradient(circle at 86% 18%,rgba(77,190,218,.24),transparent 30%),radial-gradient(circle at 50% 92%,rgba(247,197,87,.25),transparent 34%),linear-gradient(135deg,#fff3ec 0%,#eef7fb 48%,#f8eef7 100%)}
    .panel{width:min(820px,calc(100% - 32px));padding:30px;border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.68);box-shadow:0 24px 70px rgba(38,31,48,.24);text-align:center;backdrop-filter:blur(18px)}
    .brand-logo{width:88px;height:88px;display:block;margin:0 auto 14px;border-radius:24px;object-fit:cover;box-shadow:0 14px 36px rgba(89,62,35,.2);filter:saturate(.9) contrast(.96) brightness(1.03)}
    h1{margin:0 0 10px;font-size:clamp(2rem,5vw,3.35rem);line-height:1.08;letter-spacing:.02em}
    p{margin:0 0 18px;color:var(--muted);font-weight:800}
    nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:22px}
    a{padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.58);backdrop-filter:blur(12px);color:var(--ink);text-decoration:none;font-weight:900}
    .qr-card{width:min(260px,72vw);margin:0 auto;padding:14px;border:1px solid rgba(185,138,77,.28);border-radius:24px;background:linear-gradient(145deg,rgba(255,250,244,.9),rgba(246,232,222,.72));box-shadow:0 16px 42px rgba(89,62,35,.16)}
    .qr-card img{display:block;width:100%;height:auto;border-radius:18px;filter:saturate(.88) contrast(.98) brightness(1.03)}
    .qr-caption{margin:10px 0 0;color:rgba(23,21,31,.58);font-size:.92rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    @media(max-width:560px){.panel{padding:24px 18px}.brand-logo{width:72px;height:72px}.qr-card{width:min(220px,76vw)}}
  </style>
</head>
<body>
  <main class="panel">
    <img class="brand-logo" src="assets/site-logo.png" alt="Star Style Studio logo" />
    <h1>星运占台：幸运站台</h1>
    <p>Star Style Studio: Lucky Site</p>
    <p>正在根据浏览器语言进入对应页面。</p>
    <nav aria-label="Language links">
      <a href="cn/index.html">简体中文</a>
      <a href="zh/index.html">繁體中文</a>
      <a href="en/index.html">English</a>
      <a href="ja/index.html">日本語</a>
      <a href="ko/index.html">한국어</a>
    </nav>
    <section class="qr-card" aria-label="QR code">
      <img src="assets/site-qrcode.png" alt="QR code for star-style-studio.net" />
      <p class="qr-caption">star-style-studio.net</p>
    </section>
  </main>
</body>
</html>
