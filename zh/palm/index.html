<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手相命運分析 | Palm Reading & Fate Analysis</title>
    <meta
      name="description"
      content="上傳手掌照片，生成手相命運分析、掌紋解讀文字與精美手相解讀圖。"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1018;
        --panel: rgba(18, 23, 33, 0.8);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f8f2e7;
        --muted: #b8c0cf;
        --gold: #e7bc6a;
        --blue: #78bde8;
        --rose: #e1889c;
        --green: #abd66e;
        --orange: #eba450;
        --violet: #c499ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(rgba(6, 10, 18, 0.42), rgba(6, 10, 18, 0.72)),
          url("palm-bg.png") center top / cover fixed,
          linear-gradient(135deg, #0c1018 0%, #171c29 48%, #211825 100%);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans",
          "Yu Gothic",
          system-ui,
          sans-serif;
      }

      a {
        color: var(--gold);
      }

      main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
        color: var(--muted);
      }

      .home-link {
        color: var(--muted);
        text-decoration: none;
      }

      .site-title {
        text-align: center;
      }

      .site-title strong {
        display: block;
        color: var(--text);
        font-size: clamp(1.8rem, 6.3vw, 3.06rem);
        line-height: 1.15;
      }

      .site-title span {
        display: block;
        color: var(--muted);
        font-size: 0.97rem;
        font-weight: 800;
        line-height: 1.45;
      }

      .top-quota {
        min-width: 88px;
        color: var(--gold);
        font-weight: 800;
        text-align: right;
      }

      .workspace,
      .status-panel,
      .result-panel,
      .poster-panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(12px);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(280px, 0.86fr) minmax(0, 1.14fr);
        gap: 20px;
        padding: 22px;
      }

      .upload-card {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .upload-box {
        display: grid;
        gap: 10px;
        place-items: center;
        min-height: 154px;
        border: 1px dashed rgba(231, 188, 106, 0.56);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        padding: 22px;
        text-align: center;
      }

      .upload-box strong {
        color: var(--gold);
        font-size: 1.2rem;
      }

      .upload-box span {
        font-size: 0.86rem;
      }

      .upload-box span,
      .notice,
      .small {
        color: var(--muted);
        line-height: 1.7;
      }

      input[type="file"] {
        width: 100%;
        min-height: 54px;
        font-size: 1.05rem;
      }

      input[type="file"]::file-selector-button {
        min-height: 44px;
        margin-right: 12px;
        border: 1px solid rgba(231, 188, 106, 0.72);
        border-radius: 8px;
        color: #151922;
        background: var(--gold);
        padding: 0 18px;
        font: inherit;
        font-weight: 800;
      }

      .secret-mode {
        display: inline-grid;
        grid-template-columns: auto 4.8rem;
        gap: 8px;
        align-items: center;
        justify-self: start;
        opacity: 0.42;
      }

      .secret-mode label {
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1;
      }

      .secret-mode input {
        width: 4.8rem;
        min-height: 26px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        color: var(--text);
        background: rgba(8, 12, 20, 0.42);
        padding: 0 7px;
        font: 0.86rem ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      button,
      .download-button {
        min-height: 46px;
        border: 1px solid rgba(231, 188, 106, 0.72);
        border-radius: 8px;
        color: #151922;
        background: var(--gold);
        padding: 0 18px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }

      button:disabled,
      .download-button.is-disabled {
        border-color: rgba(255, 255, 255, 0.14);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.08);
        cursor: not-allowed;
        pointer-events: none;
      }

      .status {
        min-height: 24px;
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status.is-loading {
        color: var(--gold);
        font-weight: 800;
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      @keyframes statusPulse {
        0%,
        100% {
          opacity: 0.45;
        }

        50% {
          opacity: 1;
        }
      }

      .task-id {
        overflow-wrap: anywhere;
        margin: 0;
        color: var(--gold);
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 0.9rem;
      }

      .preview-stage {
        position: relative;
        min-height: 520px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(5, 8, 14, 0.5);
      }

      .preview-stage img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 520px;
        object-fit: contain;
      }

      .status-panel,
      .result-panel,
      .poster-panel {
        margin-top: 18px;
        padding: 22px;
      }

      .progress {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .step {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.05);
        text-align: center;
      }

      .step.is-active {
        border-color: rgba(231, 188, 106, 0.72);
        color: var(--text);
        background: rgba(231, 188, 106, 0.12);
      }

      .step.is-pulsing {
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      .section-title {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .section-title h2 {
        margin: 0;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .result-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        padding: 16px;
      }

      .result-item h3 {
        margin: 0 0 10px;
        color: var(--gold);
        font-size: 1rem;
      }

      .result-item p {
        margin: 0;
        color: #dfe7ef;
        line-height: 1.75;
      }

      .bottom-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .bottom-grid .result-item:nth-child(1) h3 {
        color: var(--violet);
      }

      .bottom-grid .result-item:nth-child(2) h3 {
        color: var(--blue);
      }

      .bottom-grid .result-item:nth-child(3) h3 {
        color: var(--green);
      }

      .bottom-grid .result-item:nth-child(4) h3 {
        color: var(--orange);
      }

      .poster-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .poster-preview {
        display: grid;
        place-items: center;
        min-height: 260px;
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .poster-preview img {
        display: block;
        width: min(100%, 520px);
        height: auto;
      }

      .countdown {
        color: var(--gold);
        font-weight: 800;
      }

      .poster-panel.is-waiting .countdown,
      .poster-panel.is-waiting .poster-preview {
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      @media (max-width: 860px) {
        .workspace,
        .result-grid,
        .bottom-grid,
        .progress {
          grid-template-columns: 1fr;
        }

        .topbar {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .top-quota {
          text-align: center;
        }

        .preview-stage,
        .preview-stage img {
          min-height: 420px;
        }
      }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5940567227813698"
     crossorigin="anonymous"></script>
</head>
  <body>
    <main>
      <div class="topbar">
        <a class="home-link" href="../index.html">返回首頁</a>
        <div class="site-title">
          <strong>手相命運分析</strong>
          <span>Palm Reading & Fate Analysis</span>
          <span>手相鑑定</span>
        </div>
        <span class="top-quota">每日分析次數 3</span>
      </div>

      <section class="workspace">
        <form class="upload-card" id="palmForm">
          <label class="upload-box">
            <strong>上傳手掌照片</strong>
            <span>支援 JPG / PNG / WebP，圖片需小於 10MB。後台會自動壓縮後提交分析。</span>
            <input id="palmFile" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>

          <div class="secret-mode">
            <label for="posterModeCode">口令</label>
            <input id="posterModeCode" type="password" inputmode="latin" autocomplete="off" aria-label="口令" />
          </div>

          <button id="submitButton" type="submit" disabled>提交分析任務</button>
          <p class="status" id="statusText">請先上傳照片。</p>
          <p class="task-id" id="taskIdText"></p>

          <p class="notice">
            AI先返回文字分析，隨後生成精美海報圖片。圖片僅用於本次分析，不用於身分識別。
          </p>
        </form>

        <div class="preview-stage">
          <img id="palmPreview" alt="手掌照片預覽" hidden />
        </div>
      </section>

      <section class="status-panel" id="statusPanel" hidden>
        <strong>任務狀態：<span id="taskStatusLabel">等待提交</span></strong>
        <div class="progress" aria-label="處理进度">
          <div class="step" data-step="queued">排隊中</div>
          <div class="step" data-step="processing">分析中</div>
          <div class="step" data-step="text_ready">文字完成</div>
          <div class="step" data-step="rendering">生成海報</div>
          <div class="step" data-step="ready">可下載</div>
        </div>
      </section>

      <section class="result-panel" id="resultPanel" hidden>
        <div class="section-title">
          <h2>手相文字解讀</h2>
          <span class="small">第一步：AI 分析文字結果</span>
        </div>
        <div class="result-grid" id="mainResultGrid"></div>
        <div class="bottom-grid" id="bottomResultGrid"></div>
        <p class="small">本結果用於娱乐與自我觀察参考，不構成醫療、投資或人生重大決策建議。</p>
      </section>

      <section class="poster-panel" id="posterPanel" hidden>
        <div class="section-title">
          <h2>精美海報風“手相解讀”圖</h2>
          <div class="poster-actions">
            <span class="countdown" id="countdownText">等待圖片生成</span>
            <a class="download-button is-disabled" id="downloadReading" href="#" download="palm-reading.png">下載「手相解讀」圖</a>
          </div>
        </div>
        <div class="poster-preview" id="posterPreview">
          <span class="small">海報生成中，請稍候。</span>
        </div>
      </section>
    </main>

    <script src="/analytics.js"></script>
    <script>
      (() => {
        const host = window.location.hostname;
        const homeUrl = host.endsWith("star-style-studio.net")
          ? "https://www.star-style-studio.net/index.html"
          : host === "tsukukiku.github.io"
            ? "https://tsukukiku.github.io/index.html"
            : "../index.html";
        document.querySelectorAll("[data-home-link]").forEach((link) => {
          link.href = homeUrl;
        });
      })();

      const API = {
        submit: "https://tsukukiku.synology.me/api/palm-submit.php",
        status: "https://tsukukiku.synology.me/api/palm-status.php",
        result: "https://tsukukiku.synology.me/api/palm-result.php"
      };

      const MAX_SIZE = 10 * 1024 * 1024;
      const MAIN_SECTION_TITLES = ["整體印象", "智慧線", "生命線", "感情線", "事業線", "財運分析", "總體運勢解讀"];
      const BOTTOM_SECTION_TITLES = ["性格特質", "適合領域", "開運建議", "幸運指引"];
      const WESTERN_BOTTOM_SECTION_TITLES = ["年齡階段", "性格特質", "適合領域", "開運建議", "幸運指引"];
      const CHINESE_SECTION_TITLES = ["感情線", "智慧線", "生命線", "金星丘", "火星丘", "木星丘", "土星丘", "水星丘", "目前運勢", "事業線", "太陽線", "健康線", "婚姻線", "月丘", "綜合解讀"];

      const palmFile = document.querySelector("#palmFile");
      const palmForm = document.querySelector("#palmForm");
      const palmPreview = document.querySelector("#palmPreview");
      const posterModeCode = document.querySelector("#posterModeCode");
      const submitButton = document.querySelector("#submitButton");
      const statusText = document.querySelector("#statusText");
      const taskIdText = document.querySelector("#taskIdText");
      const statusPanel = document.querySelector("#statusPanel");
      const taskStatusLabel = document.querySelector("#taskStatusLabel");
      const resultPanel = document.querySelector("#resultPanel");
      const mainResultGrid = document.querySelector("#mainResultGrid");
      const bottomResultGrid = document.querySelector("#bottomResultGrid");
      const posterPanel = document.querySelector("#posterPanel");
      const posterPreview = document.querySelector("#posterPreview");
      const countdownText = document.querySelector("#countdownText");
      const downloadReading = document.querySelector("#downloadReading");

      let uploadedFile = null;
      let previewUrl = "";
      let pollTimer = null;
      let countdownTimer = null;
      let progressTimers = [];
      let currentTaskId = "";
      let readingImageUrl = "";
      let textHasRendered = false;

      palmFile.addEventListener("change", () => {
        const file = palmFile.files?.[0];
        resetState();

        if (!file) {
          uploadedFile = null;
          submitButton.disabled = true;
          statusText.textContent = "請先上傳照片。";
          statusText.classList.remove("is-loading");
          return;
        }

        if (file.size > MAX_SIZE) {
          uploadedFile = null;
          submitButton.disabled = true;
          palmPreview.hidden = true;
          statusText.textContent = "圖片超過 10MB，請壓縮後重新上傳。";
          statusText.classList.remove("is-loading");
          return;
        }

        uploadedFile = file;
        if (previewUrl) URL.revokeObjectURL(previewUrl);
        previewUrl = URL.createObjectURL(file);
        palmPreview.src = previewUrl;
        palmPreview.hidden = false;
        submitButton.disabled = false;
        statusText.textContent = "照片已載入，可以提交分析任務。";
        statusText.classList.remove("is-loading");
      });

      palmForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!uploadedFile || submitButton.disabled) return;
        submitButton.disabled = true;
        statusPanel.hidden = false;
        setTaskStatus("queued");
        startTimedProgress();
        statusText.textContent = "正在上傳圖片，請等待";
        statusText.classList.add("is-loading");
        statusText.scrollIntoView({ behavior: "smooth", block: "center" });

        try {
          const submitResult = await submitTask();
          currentTaskId = submitResult.task_id;
          taskIdText.textContent = `任務編號：${currentTaskId}`;
          statusText.textContent = submitResult.message || "任務已提交，正在分析。";
          statusText.classList.remove("is-loading");

          if (submitResult.main_sections || submitResult.sections) {
            renderTextResult(submitResult);
          }

          pollTask();
        } catch (error) {
          statusText.textContent = formatSubmitError(error);
          statusText.classList.remove("is-loading");
          setTaskStatus("failed");
          submitButton.disabled = false;
        }
      });

      async function submitTask() {
        const formData = new FormData();
        formData.append("handImage", uploadedFile);
        formData.append("handSide", "unknown");
        const modeCode = posterModeCode.value.trim().toUpperCase();
        const hiddenModes = [`${"IM"}${"G2"}${"X"}`, `${"IM"}${"G2"}${"Y"}`, `${"IM"}${"G2"}${"Z"}`];
        const mappedModeCode = modeCode === "666" ? hiddenModes[0] : modeCode;
        if (hiddenModes.includes(mappedModeCode)) {
          formData.append("posterMode", mappedModeCode);
        }

        let response;
        try {
          response = await fetch(API.submit, {
            method: "POST",
            body: formData,
            mode: "cors"
          });
        } catch (error) {
          throw new Error(`無法連結Server API：${error.message || "網路請求被瀏覽器阻擋。"}`);
        }

        const text = await response.text();
        let payload = null;
        try {
          payload = text ? JSON.parse(text) : null;
        } catch (error) {
          payload = null;
        }

        if (!response.ok) {
          throw new Error(payload?.error || payload?.message || text || `HTTP ${response.status}`);
        }

        return payload || {};
      }

      async function pollTask() {
        clearTimeout(pollTimer);

        try {
          const response = await fetch(`${API.status}?task_id=${encodeURIComponent(currentTaskId)}`);
          const text = await response.text();
          let data = null;
          try {
            data = text ? JSON.parse(text) : null;
          } catch (error) {
            data = null;
          }
          if (!response.ok) throw new Error(data?.error || data?.message || text || `HTTP ${response.status}`);
          if (!data) throw new Error("狀態介面没有返回有效 JSON。");

          setTaskStatus(data.status);
          statusText.textContent = data.message || statusText.textContent;
          statusText.classList.remove("is-loading");

          if ((data.status === "text_ready" || data.status === "rendering" || data.status === "ready") && !textHasRendered) {
            renderTextResult(data);
            resultPanel.scrollIntoView({ behavior: "smooth", block: "start" });
          }

          if (data.status === "rendering") {
            showPosterWaiting();
          }

          if (data.status === "ready") {
            renderTextResult(data);
            showPosterReady(data);
            return;
          }

          if (data.status === "failed" || data.status === "expired") {
            clearTimedProgress();
            statusText.textContent = data.message || "任務未能完成，請稍後重試。";
            statusText.classList.remove("is-loading");
            submitButton.disabled = false;
            return;
          }

          pollTimer = setTimeout(pollTask, data.status === "rendering" ? 3000 : 2500);
        } catch (error) {
          clearTimedProgress();
          statusText.textContent = `狀態查詢失敗：${error.message || "請檢查Server API是否可存取。"}`;
          statusText.classList.remove("is-loading");
          setTaskStatus("failed");
          submitButton.disabled = false;
        }
      }

      function renderTextResult(data) {
        const isChinese = data.analysis_variant === "chinese" || data.analysis_variant === "zhonghua_auto";
        const mainSections = isChinese
          ? normalizeSections(data.main_sections || data.sections, CHINESE_SECTION_TITLES)
          : normalizeSections(data.main_sections || data.sections, MAIN_SECTION_TITLES);
        const bottomSections = isChinese
          ? []
          : normalizeSections(
              data.bottom_sections || data.footer_sections || data.lucky_sections,
              data.analysis_variant === "western" ? WESTERN_BOTTOM_SECTION_TITLES : BOTTOM_SECTION_TITLES
            );

        resultPanel.hidden = false;
        textHasRendered = true;

        mainResultGrid.innerHTML = mainSections.map(renderSectionCard).join("");
        bottomResultGrid.innerHTML = bottomSections.map(renderSectionCard).join("");
        bottomResultGrid.hidden = bottomSections.length === 0;
      }

      function showPosterWaiting() {
        posterPanel.hidden = false;
        posterPanel.classList.add("is-waiting");
        posterPreview.innerHTML = '<span class="small">海報製作中，請稍候。</span>';
        countdownText.textContent = "海報製作中";
        downloadReading.classList.add("is-disabled");
        downloadReading.removeAttribute("href");
      }

      function showPosterReady(data) {
        clearTimeout(pollTimer);
        clearTimedProgress();
        posterPanel.hidden = false;
        posterPanel.classList.remove("is-waiting");
        statusText.textContent = data.message || "分析完成，海報圖已生成。";

        readingImageUrl = data.image_url || `${API.result}?task_id=${encodeURIComponent(currentTaskId)}`;
        posterPreview.innerHTML = `<img src="${escapeAttribute(readingImageUrl)}" alt="精美海報風手相解讀圖" />`;
        startDownloadCountdown();
      }

      function normalizeSections(sections, titles) {
        const source = Array.isArray(sections) ? sections : [];
        return titles.map((title, index) => {
          const found = source.find((item) => {
            const itemTitle = Array.isArray(item) ? item[0] : item?.title;
            return itemTitle && String(itemTitle).includes(title);
          }) || source[index];

          if (Array.isArray(found)) {
            return { title: found[0] || title, body: found[1] || "結果生成中。" };
          }

          return {
            title: found?.title || title,
            body: found?.body || found?.content || "結果生成中。"
          };
        });
      }

      function renderSectionCard(section) {
        return `<article class="result-item"><h3>${escapeHtml(section.title)}</h3><p>${escapeHtml(section.body)}</p></article>`;
      }

      function setTaskStatus(status) {
        const normalizedStatus = status === "analyzing" ? "processing" : status;
        const labelMap = {
          queued: "排隊中",
          processing: "分析中",
          text_ready: "文字完成",
          rendering: "生成海報",
          ready: "可下載",
          failed: "失敗",
          expired: "已過期"
        };

        taskStatusLabel.textContent = labelMap[normalizedStatus] || normalizedStatus;
        document.querySelectorAll(".step").forEach((step) => {
          const isCurrent = step.dataset.step === normalizedStatus;
          step.classList.toggle("is-active", isCurrent);
          step.classList.toggle("is-pulsing", isCurrent && !["ready", "failed", "expired"].includes(normalizedStatus));
        });
      }

      function startTimedProgress() {
        clearTimedProgress();
        progressTimers = [
          setTimeout(() => {
            if (!readingImageUrl) {
              setTaskStatus("processing");
              statusText.textContent = "正在分析中，請稍候。";
              statusText.classList.remove("is-loading");
            }
          }, 10000),
          setTimeout(() => {
            if (!readingImageUrl) {
              setTaskStatus("text_ready");
              statusText.textContent = "文字分析預計已完成，正在生成海報。";
              statusText.classList.remove("is-loading");
            }
          }, 40000),
          setTimeout(() => {
            if (!readingImageUrl) {
              setTaskStatus("rendering");
              showPosterWaiting();
            }
          }, 45000)
        ];
      }

      function clearTimedProgress() {
        progressTimers.forEach((timer) => clearTimeout(timer));
        progressTimers = [];
      }

      function formatSubmitError(error) {
        const message = String(error?.message || "");
        if (message.includes("今日") || message.includes("次數") || message.includes("limit") || message.includes("429")) {
          return "提交失敗：超過當日次數。";
        }

        return `提交失敗：${message || "無法連結Server API，請檢查網域、HTTPS、CORS 或 PHP 後端。"}`;
      }

      function startDownloadCountdown() {
        let seconds = 60;
        downloadReading.classList.add("is-disabled");
        downloadReading.removeAttribute("href");
        countdownText.textContent = `${seconds} 秒後可下載`;
        clearInterval(countdownTimer);

        countdownTimer = setInterval(() => {
          seconds -= 1;
          countdownText.textContent = `${seconds} 秒後可下載`;

          if (seconds <= 0) {
            clearInterval(countdownTimer);
            countdownText.textContent = "可以下載";
            downloadReading.classList.remove("is-disabled");
            downloadReading.href = readingImageUrl;
          }
        }, 1000);
      }

      function resetState() {
        clearTimeout(pollTimer);
        clearInterval(countdownTimer);
        clearTimedProgress();
        currentTaskId = "";
        readingImageUrl = "";
        textHasRendered = false;
        taskIdText.textContent = "";
        statusPanel.hidden = true;
        resultPanel.hidden = true;
        posterPanel.hidden = true;
        mainResultGrid.innerHTML = "";
        bottomResultGrid.innerHTML = "";
        posterPreview.innerHTML = '<span class="small">海報生成中，請稍候。</span>';
        countdownText.textContent = "等待圖片生成";
        posterPanel.classList.remove("is-waiting");
        downloadReading.classList.add("is-disabled");
        downloadReading.removeAttribute("href");
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        })[char]);
      }

      function escapeAttribute(value) {
        return String(value ?? "").replace(/["'<>&]/g, (char) => ({
          "\"": "&quot;",
          "'": "&#039;",
          "<": "&lt;",
          ">": "&gt;",
          "&": "&amp;"
        })[char]);
      }
    </script>
  </body>
</html>
