<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>個人形象分析 | Personal Style Analysis</title>
    <meta
      name="description"
      content="上传清晰头像照片，选择性别与年龄段，生成个人发型分析与形象建议。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #fff7f4;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-strong: rgba(255, 255, 255, 0.94);
        --text: #2c2730;
        --muted: #776d77;
        --line: rgba(177, 109, 118, 0.24);
        --rose: #d95870;
        --coral: #ff8d77;
        --peach: #ffd6bd;
        --cream: #fff4e6;
        --gold: #c89447;
        --blue: #5e9edb;
        --green: #56a878;
        --shadow: 0 24px 70px rgba(165, 82, 96, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at 16% 8%, rgba(255, 214, 189, 0.92), transparent 30%),
          radial-gradient(circle at 86% 12%, rgba(214, 230, 255, 0.9), transparent 28%),
          linear-gradient(135deg, #fff9f1 0%, #ffe9ea 45%, #eef6ff 100%);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans",
          "Yu Gothic",
          system-ui,
          sans-serif;
      }

      a {
        color: var(--rose);
      }

      main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 24px 0 52px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .home-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .home-links a,
      .lang-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--text);
        padding: 8px 12px;
        text-decoration: none;
        font-weight: 800;
        box-shadow: 0 8px 18px rgba(165, 82, 96, 0.08);
      }

      .site-title {
        text-align: center;
      }

      .site-title strong {
        display: block;
        color: #241f25;
        font-size: clamp(1.95rem, 6vw, 3.9rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .site-title span {
        display: block;
        color: var(--muted);
        font-size: clamp(0.88rem, 2.5vw, 1.05rem);
        font-weight: 800;
        line-height: 1.55;
      }

      .workspace,
      .status-panel,
      .result-panel,
      .poster-panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(290px, 0.92fr) minmax(0, 1.08fr);
        gap: 20px;
        padding: 22px;
      }

      .upload-card {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .upload-box {
        display: grid;
        gap: 12px;
        place-items: center;
        min-height: 166px;
        border: 1px dashed rgba(217, 88, 112, 0.52);
        border-radius: 12px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.74), rgba(255, 244, 230, 0.82)),
          rgba(255, 255, 255, 0.8);
        padding: 22px;
        text-align: center;
      }

      .upload-box strong {
        color: var(--rose);
        font-size: 1.24rem;
      }

      .upload-box span,
      .notice,
      .small {
        color: var(--muted);
        line-height: 1.72;
      }

      input[type="file"] {
        width: 100%;
        min-height: 54px;
        font-size: 1.03rem;
      }

      input[type="file"]::file-selector-button {
        min-height: 44px;
        margin-right: 12px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, var(--rose), var(--coral));
        padding: 0 18px;
        font: inherit;
        font-weight: 900;
      }

      .control-group {
        display: grid;
        gap: 8px;
      }

      .control-group > label,
      .secret-mode label {
        color: #5f5660;
        font-size: 0.9rem;
        font-weight: 900;
      }

      .segmented,
      .age-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .segmented input,
      .age-grid input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segmented span,
      .age-grid span {
        display: inline-grid;
        place-items: center;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        padding: 0 14px;
        font-weight: 850;
        cursor: pointer;
      }

      .segmented input:checked + span,
      .age-grid input:checked + span {
        border-color: rgba(217, 88, 112, 0.6);
        color: #fff;
        background: linear-gradient(135deg, var(--rose), var(--coral));
        box-shadow: 0 10px 18px rgba(217, 88, 112, 0.22);
      }

      .secret-mode {
        display: inline-grid;
        grid-template-columns: auto 6.2rem;
        gap: 10px;
        align-items: center;
        justify-self: start;
      }

      .secret-mode input {
        width: 6.2rem;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.82);
        padding: 0 9px;
        font: 0.95rem ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      button,
      .download-button {
        min-height: 50px;
        border: 0;
        border-radius: 10px;
        color: #fff;
        background: linear-gradient(135deg, var(--rose), var(--coral));
        padding: 0 20px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        box-shadow: 0 15px 28px rgba(217, 88, 112, 0.24);
      }

      button:disabled,
      .download-button.is-disabled {
        color: var(--muted);
        background: rgba(151, 135, 143, 0.14);
        box-shadow: none;
        cursor: not-allowed;
        pointer-events: none;
      }

      .status {
        min-height: 25px;
        margin: 0;
        color: var(--rose);
        font-weight: 850;
      }

      .status.is-loading {
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      @keyframes statusPulse {
        0%,
        100% {
          opacity: 0.5;
        }

        50% {
          opacity: 1;
        }
      }

      .task-id {
        margin: 0;
        color: var(--muted);
        font: 0.8rem ui-monospace, SFMono-Regular, Consolas, monospace;
        overflow-wrap: anywhere;
      }

      .preview-stage {
        min-height: 390px;
        display: grid;
        gap: 14px;
        align-content: start;
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid rgba(255, 255, 255, 0.74);
        padding: 14px;
      }

      .uploaded-preview {
        display: grid;
        place-items: center;
        min-height: 92px;
        border: 1px dashed rgba(217, 88, 112, 0.24);
        border-radius: 10px;
        background: linear-gradient(135deg, rgba(255, 247, 244, 0.84), rgba(255, 255, 255, 0.9));
      }

      .uploaded-preview img {
        width: min(48%, 170px);
        max-height: 140px;
        object-fit: contain;
        border-radius: 10px;
        border: 5px solid rgba(255, 255, 255, 0.82);
        box-shadow: 0 22px 48px rgba(68, 42, 52, 0.22);
      }

      .showcase-slider {
        position: relative;
        min-height: 420px;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
        box-shadow: inset 0 0 0 1px rgba(217, 88, 112, 0.12);
      }

      .showcase-track {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        gap: 9px;
        width: max-content;
        padding: 14px 9px;
        animation: showcaseMarquee 30s linear infinite;
      }

      .showcase-slide {
        flex: 0 0 auto;
        width: min(78vw, 336px);
        height: 392px;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 12px 28px rgba(68, 42, 52, 0.14);
      }

      .showcase-slide img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        background: #fff;
      }

      @keyframes showcaseMarquee {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(calc(-50% - 9px));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .showcase-track {
          animation: none;
          overflow-x: auto;
          width: 100%;
        }
      }

      .status-panel,
      .result-panel,
      .poster-panel {
        margin-top: 18px;
        padding: 20px;
      }

      .progress {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      .step {
        min-height: 42px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.66);
        font-weight: 850;
        text-align: center;
      }

      .step.is-active {
        color: #fff;
        background: linear-gradient(135deg, var(--rose), var(--coral));
      }

      .step.is-pulsing {
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      .section-title {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        margin-bottom: 14px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 1.32rem;
      }

      .section-title .title-note {
        flex-basis: 100%;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      .result-item {
        min-height: 132px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-strong);
        padding: 14px;
      }

      .result-item h3 {
        margin: 0 0 8px;
        color: var(--rose);
        font-size: 1.02rem;
      }

      .result-item p {
        margin: 0;
        color: #4c444d;
        line-height: 1.65;
      }

      .style-board {
        display: grid;
        gap: 16px;
      }

      .style-category {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-strong);
        padding: 14px;
      }

      .style-category h3 {
        margin: 0 0 12px;
        color: var(--rose);
      }

      .style-list {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .style-card {
        min-height: 124px;
        border-radius: 10px;
        background: linear-gradient(135deg, #fff7f4, #fff);
        border: 1px solid rgba(217, 88, 112, 0.16);
        padding: 12px;
      }

      .style-card strong {
        display: block;
        margin-bottom: 6px;
        color: #392d36;
      }

      .style-card span {
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.93rem;
      }

      .poster-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
        align-items: center;
      }

      .countdown {
        color: var(--rose);
        font-weight: 900;
      }

      .poster-preview {
        display: grid;
        place-items: center;
        min-height: 280px;
        border: 1px dashed rgba(217, 88, 112, 0.28);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.62);
        overflow: hidden;
      }

      .poster-preview img {
        display: block;
        width: min(100%, 920px);
        height: auto;
      }

      .poster-panel.is-waiting .countdown,
      .poster-panel.is-waiting .poster-preview {
        animation: statusPulse 0.9s ease-in-out infinite;
      }

      @media (max-width: 860px) {
        main {
          width: min(100% - 18px, 720px);
          padding-top: 14px;
        }

        .topbar,
        .workspace,
        .section-title {
          grid-template-columns: 1fr;
        }

        .site-title {
          text-align: center;
        }

        .workspace {
          padding: 14px;
        }

        .preview-stage {
          min-height: 340px;
        }

        .showcase-slider {
          min-height: 390px;
        }

        .showcase-slide {
          width: min(88vw, 314px);
          height: 366px;
        }

        .progress,
        .result-grid,
        .style-list {
          grid-template-columns: 1fr;
        }

        .poster-actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <nav class="home-links" aria-label="homepage links">
          <a href="../index.html">????</a>
        </nav>
        <div class="site-title">
          <strong>个人形象分析</strong>
          <span>Personal Style Analysis</span>
          <span>パーソナルスタイル診断</span>
        </div>
        <span class="lang-chip">每日限3次</span>
      </header>

      <section class="workspace">
        <form class="upload-card" id="hairForm">
          <label class="upload-box">
            <strong>上传清晰头像照片</strong>
            <span>支持 JPG / PNG / WebP，建议正面、光线充足、露出脸型与当前发型。</span>
            <input id="hairFile" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>

          <div class="control-group">
            <label>选择性别</label>
            <div class="segmented">
              <label><input type="radio" name="gender" value="female" checked /><span>女性</span></label>
              <label><input type="radio" name="gender" value="male" /><span>男性</span></label>
              <label><input type="radio" name="gender" value="neutral" /><span>不限定</span></label>
            </div>
          </div>

          <div class="control-group">
            <label>大概年龄</label>
            <div class="age-grid" id="ageGrid">
              <label><input type="radio" name="ageRange" value="15-" /><span>15-</span></label>
              <label><input type="radio" name="ageRange" value="20" /><span>20</span></label>
              <label><input type="radio" name="ageRange" value="25" checked /><span>25</span></label>
              <label><input type="radio" name="ageRange" value="30" /><span>30</span></label>
              <label><input type="radio" name="ageRange" value="35" /><span>35</span></label>
              <label><input type="radio" name="ageRange" value="40" /><span>40</span></label>
              <label><input type="radio" name="ageRange" value="45" /><span>45</span></label>
              <label><input type="radio" name="ageRange" value="50" /><span>50</span></label>
              <label><input type="radio" name="ageRange" value="55" /><span>55</span></label>
              <label><input type="radio" name="ageRange" value="60" /><span>60</span></label>
              <label><input type="radio" name="ageRange" value="65+" /><span>65+</span></label>
            </div>
          </div>

          <div class="secret-mode">
            <label for="accessCode">口令</label>
            <input id="accessCode" type="password" inputmode="latin" autocomplete="off" aria-label="口令" />
          </div>

          <button id="submitButton" type="submit" disabled>提交照片分析</button>
          <p class="status" id="statusText">请先上传头像照片。</p>
          <p class="task-id" id="taskIdText"></p>

          <p class="notice">输入口令后，AI 会先返回文字分析，随后生成个人发型分析与形象建议海报。图片仅用于本次分析，不用于身份识别。</p>
        </form>

        <div class="preview-stage">
          <div class="uploaded-preview">
            <img id="hairPreview" alt="头像照片预览" hidden />
            <span class="small" id="previewHint">上传后在这里预览头像</span>
          </div>
          <div class="showcase-slider" aria-label="发型分析示例轮播">
            <div class="showcase-track">
              <div class="showcase-slide"><img src="showcase/hair-showcase-01a.jpg" alt="发型分析海报示例 1" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-02a.jpg" alt="发型分析海报示例 2" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-03a.jpg" alt="发型分析海报示例 3" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-04a.jpg" alt="发型分析海报示例 4" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-01a.jpg" alt="发型分析海报示例 1" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-02a.jpg" alt="发型分析海报示例 2" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-03a.jpg" alt="发型分析海报示例 3" loading="lazy" /></div>
              <div class="showcase-slide"><img src="showcase/hair-showcase-04a.jpg" alt="发型分析海报示例 4" loading="lazy" /></div>
            </div>
          </div>
        </div>
      </section>

      <section class="status-panel" id="statusPanel" hidden>
        <strong>任务状态：<span id="taskStatusLabel">等待提交</span></strong>
        <div class="progress" aria-label="处理进度">
          <div class="step" data-step="queued">排队中</div>
          <div class="step" data-step="processing">分析中</div>
          <div class="step" data-step="text_ready">文字完成</div>
          <div class="step" data-step="rendering">生成海报</div>
          <div class="step" data-step="ready">可以下载</div>
        </div>
      </section>

      <section class="result-panel" id="resultPanel" hidden>
        <div class="section-title">
          <h2>个人发型分析与形象建议</h2>
          <span class="small title-note">先显示文字版解说</span>
        </div>
        <div class="result-grid" id="summaryGrid"></div>
        <div class="style-board" id="styleBoard"></div>
      </section>

      <section class="poster-panel" id="posterPanel" hidden>
        <div class="section-title">
          <h2>形象建议海报</h2>
          <div class="poster-actions">
            <span class="countdown" id="countdownText">等待海报生成</span>
            <a class="download-button is-disabled" id="downloadPoster" href="#" download="hair-style-analysis.png">下载形象建议图</a>
          </div>
        </div>
        <div class="poster-preview" id="posterPreview">
          <span class="small">海报生成中，请稍候。</span>
        </div>
      </section>
    </main>

    <script src="/analytics.js"></script>
    <script>
      (() => {
        const host = window.location.hostname;
        const homeUrl = host.endsWith("star-style-studio.net")
          ? "https://www.star-style-studio.net/index.html"
          : host === "tsukukiku.github.io"
            ? "https://tsukukiku.github.io/index.html"
            : "../index.html";
        document.querySelectorAll("[data-home-link]").forEach((link) => {
          link.href = homeUrl;
        });
      })();

      const API = {
        submit: "https://tsukukiku.synology.me/api/hair-submit.php",
        status: "https://tsukukiku.synology.me/api/hair-status.php",
        result: "https://tsukukiku.synology.me/api/hair-result.php"
      };

      const MAX_SIZE = 10 * 1024 * 1024;
      const REQUIRED_CODE = `${"HA"}${"IR"}`;
      const HAIR_PROMPT = `你是一名优秀的个人形象设计师和发型设计师。请根据用户上传的头像照片、性别和年龄段，从实际情况和时尚角度判断，对用户现有发型与整体形象做出中肯评判，并制作“个人发型分析与形象建议”。必须使用简体中文。输出 JSON。内容包括：1. 脸型分析；2. 发质特征；3. 气质定位；4. 核心策略；5. 发型总体建议五条；6. 适合场景四类，每类带图标；7. 第一类“最适合”，重点推荐第1、2、3、4种发型，并为每种发型描述正面与偏右45度真人发型照；8. 第二类“可尝试”，推荐第1、2、3、4种发型，并为每种发型描述正面与偏右45度真人发型照；9. 第三类“避坑发型”，不建议第1、2、3、4种发型，并为每种发型描述正面与偏右45度真人发型照；10. 日常打理建议三条；11. 理发美发沟通关键词4-6个；12. 整体方向总结，格式为“以……为核心，建议采用……，通过……提升气质与减龄感。”；13. 形象提升方向，如更年轻、更知性、更显脸小、更易打理；14. 底部小贴士，说明多久修剪一次、保持什么状态、使用什么发品为佳。制图时参考模板，允许适当调整，但三大类与12种发型图示必须存在。`;

      const SUMMARY_TITLES = ["脸型分析", "发质特征", "气质定位", "核心策略", "发型总体建议", "适合场景", "日常打理建议", "整体方向总结"];
      const CATEGORY_KEYS = [
        { key: "最适合", title: "最适合（重点推荐）" },
        { key: "可尝试", title: "可尝试（风格延伸）" },
        { key: "避坑发型", title: "避坑发型（不建议）" }
      ];

      const hairFile = document.querySelector("#hairFile");
      const hairForm = document.querySelector("#hairForm");
      const hairPreview = document.querySelector("#hairPreview");
      const previewHint = document.querySelector("#previewHint");
      const accessCode = document.querySelector("#accessCode");
      const submitButton = document.querySelector("#submitButton");
      const statusText = document.querySelector("#statusText");
      const taskIdText = document.querySelector("#taskIdText");
      const statusPanel = document.querySelector("#statusPanel");
      const taskStatusLabel = document.querySelector("#taskStatusLabel");
      const resultPanel = document.querySelector("#resultPanel");
      const summaryGrid = document.querySelector("#summaryGrid");
      const styleBoard = document.querySelector("#styleBoard");
      const posterPanel = document.querySelector("#posterPanel");
      const posterPreview = document.querySelector("#posterPreview");
      const countdownText = document.querySelector("#countdownText");
      const downloadPoster = document.querySelector("#downloadPoster");

      let uploadedFile = null;
      let previewUrl = "";
      let pollTimer = null;
      let countdownTimer = null;
      let currentTaskId = "";
      let posterImageUrl = "";
      let textHasRendered = false;

      hairFile.addEventListener("change", () => {
        const file = hairFile.files?.[0];
        resetState();

        if (!file) {
          uploadedFile = null;
          submitButton.disabled = true;
          statusText.textContent = "请先上传头像照片。";
          previewHint.hidden = false;
          return;
        }

        if (file.size > MAX_SIZE) {
          uploadedFile = null;
          submitButton.disabled = true;
          hairPreview.hidden = true;
          previewHint.hidden = false;
          statusText.textContent = "图片超过 10MB，请压缩后重新上传。";
          return;
        }

        uploadedFile = file;
        if (previewUrl) URL.revokeObjectURL(previewUrl);
        previewUrl = URL.createObjectURL(file);
        hairPreview.src = previewUrl;
        hairPreview.hidden = false;
        previewHint.hidden = true;
        submitButton.disabled = false;
        statusText.textContent = "头像已载入，请选择性别、年龄，并输入口令。";
      });

      hairForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!uploadedFile || submitButton.disabled) return;

        if (accessCode.value.trim().toUpperCase() !== REQUIRED_CODE) {
          statusText.textContent = "口令不正确，请确认后再提交。";
          return;
        }

        submitButton.disabled = true;
        statusPanel.hidden = false;
        setTaskStatus("queued");
        statusText.textContent = "正在上传头像，请等待。";
        statusText.classList.add("is-loading");
        statusText.scrollIntoView({ behavior: "smooth", block: "center" });

        try {
          const submitResult = await submitTask();
          currentTaskId = submitResult.task_id;
          taskIdText.textContent = currentTaskId ? `任务编号：${currentTaskId}` : "";
          statusText.textContent = submitResult.message || "任务已提交，正在分析。";
          statusText.classList.remove("is-loading");

          if (submitResult.analysis || submitResult.sections) {
            renderTextResult(submitResult);
          }

          pollTask();
        } catch (error) {
          statusText.textContent = formatSubmitError(error);
          statusText.classList.remove("is-loading");
          setTaskStatus("failed");
          submitButton.disabled = false;
        }
      });

      async function submitTask() {
        const formData = new FormData();
        formData.append("faceImage", uploadedFile);
        formData.append("gender", document.querySelector("input[name='gender']:checked")?.value || "neutral");
        formData.append("ageRange", document.querySelector("input[name='ageRange']:checked")?.value || "25");
        formData.append("mode", REQUIRED_CODE);
        formData.append("analysisPrompt", HAIR_PROMPT);
        formData.append("templateName", "personal-hair-style-template.jpg");

        let response;
        try {
          response = await fetch(API.submit, {
            method: "POST",
            body: formData,
            mode: "cors"
          });
        } catch (error) {
          throw new Error(`无法链接Server API：${error.message || "网络请求被浏览器阻止。"}`);
        }

        const text = await response.text();
        let payload = null;
        try {
          payload = text ? JSON.parse(text) : null;
        } catch (error) {
          payload = null;
        }

        if (!response.ok) {
          throw new Error(payload?.error || payload?.message || text || `HTTP ${response.status}`);
        }

        return payload || {};
      }

      async function pollTask() {
        clearTimeout(pollTimer);

        try {
          const response = await fetch(`${API.status}?task_id=${encodeURIComponent(currentTaskId)}`);
          const text = await response.text();
          let data = null;
          try {
            data = text ? JSON.parse(text) : null;
          } catch (error) {
            data = null;
          }
          if (!response.ok) throw new Error(data?.error || data?.message || text || `HTTP ${response.status}`);
          if (!data) throw new Error("状态接口没有返回有效 JSON。");

          setTaskStatus(data.status);
          statusText.textContent = data.message || statusText.textContent;
          statusText.classList.remove("is-loading");

          if ((data.status === "text_ready" || data.status === "rendering" || data.status === "ready") && !textHasRendered) {
            renderTextResult(data);
            resultPanel.scrollIntoView({ behavior: "smooth", block: "start" });
          }

          if (data.status === "rendering") {
            showPosterWaiting();
          }

          if (data.status === "ready") {
            renderTextResult(data);
            showPosterReady(data);
            return;
          }

          if (data.status === "failed" || data.status === "expired") {
            statusText.textContent = data.message || "任务未能完成，请稍后重试。";
            submitButton.disabled = false;
            return;
          }

          pollTimer = setTimeout(pollTask, data.status === "rendering" ? 3000 : 2500);
        } catch (error) {
          statusText.textContent = `状态查询失败：${error.message || "请检查Server API是否可访问。"}`;
          statusText.classList.remove("is-loading");
          setTaskStatus("failed");
          submitButton.disabled = false;
        }
      }

      function renderTextResult(data) {
        const analysis = data.analysis || data.hair_analysis || data;
        resultPanel.hidden = false;
        textHasRendered = true;

        summaryGrid.innerHTML = SUMMARY_TITLES.map((title) => {
          const value = analysis?.[title] ?? analysis?.summary?.[title] ?? "";
          return renderSectionCard(title, stringifyValue(value));
        }).join("");

        styleBoard.innerHTML = CATEGORY_KEYS.map(({ key, title }) => {
          const list = normalizeStyleList(analysis?.[key] || analysis?.categories?.[key]);
          return `<section class="style-category"><h3>${escapeHtml(title)}</h3><div class="style-list">${list.map(renderStyleCard).join("")}</div></section>`;
        }).join("");
      }

      function renderSectionCard(title, body) {
        return `<article class="result-item"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(body || "分析生成中。")}</p></article>`;
      }

      function normalizeStyleList(value) {
        const source = Array.isArray(value) ? value : [];
        const fallback = ["第1种发型", "第2种发型", "第3种发型", "第4种发型"];
        return fallback.map((title, index) => {
          const item = source[index];
          if (typeof item === "string") return { title: item, body: "正面与偏右45度示意图生成中。" };
          return {
            title: item?.title || item?.name || title,
            body: item?.body || item?.description || item?.reason || "正面与偏右45度示意图生成中。"
          };
        });
      }

      function renderStyleCard(item, index) {
        return `<article class="style-card"><strong>${index + 1}. ${escapeHtml(item.title)}</strong><span>${escapeHtml(item.body)}</span></article>`;
      }

      function stringifyValue(value) {
        if (Array.isArray(value)) return value.map((item) => typeof item === "string" ? item : Object.values(item || {}).join("：")).join("；");
        if (value && typeof value === "object") return Object.values(value).map(stringifyValue).filter(Boolean).join("；");
        return String(value || "");
      }

      function showPosterWaiting() {
        posterPanel.hidden = false;
        posterPanel.classList.add("is-waiting");
        posterPreview.innerHTML = '<span class="small">海报制作中，请稍候。</span>';
        countdownText.textContent = "海报制作中";
        downloadPoster.classList.add("is-disabled");
        downloadPoster.removeAttribute("href");
      }

      function showPosterReady(data) {
        clearTimeout(pollTimer);
        posterPanel.hidden = false;
        posterPanel.classList.remove("is-waiting");
        statusText.textContent = data.message || "分析完成，形象建议图已生成。";

        posterImageUrl = getResultImageUrl();
        posterPreview.innerHTML = `<img src="${escapeAttribute(posterImageUrl)}" alt="个人发型分析与形象建议图" />`;
        startDownloadCountdown();
      }

      function getResultImageUrl() {
        const query = `task_id=${encodeURIComponent(currentTaskId)}`;
        if (window.location.protocol === "file:") {
          return `${API.result}?${query}`;
        }
        return `/api/hair-result.php?${query}`;
      }

      function setTaskStatus(status) {
        const normalizedStatus = status === "analyzing" ? "processing" : status;
        const labelMap = {
          queued: "排队中",
          processing: "分析中",
          text_ready: "文字完成",
          rendering: "生成海报",
          ready: "可以下载",
          failed: "失败",
          expired: "已过期"
        };

        taskStatusLabel.textContent = labelMap[normalizedStatus] || normalizedStatus;
        document.querySelectorAll(".step").forEach((step) => {
          const isCurrent = step.dataset.step === normalizedStatus;
          step.classList.toggle("is-active", isCurrent);
          step.classList.toggle("is-pulsing", isCurrent && !["ready", "failed", "expired"].includes(normalizedStatus));
        });
      }

      function startDownloadCountdown() {
        let seconds = 30;
        downloadPoster.classList.add("is-disabled");
        downloadPoster.removeAttribute("href");
        countdownText.textContent = `${seconds} 秒后可下载`;
        clearInterval(countdownTimer);

        countdownTimer = setInterval(() => {
          seconds -= 1;
          countdownText.textContent = `${seconds} 秒后可下载`;

          if (seconds <= 0) {
            clearInterval(countdownTimer);
            countdownText.textContent = "可以下载";
            downloadPoster.classList.remove("is-disabled");
            downloadPoster.href = posterImageUrl;
          }
        }, 1000);
      }

      function formatSubmitError(error) {
        const message = String(error?.message || "");
        if (message.includes("404")) {
          return "提交失败：Server API 尚未部署 hair 接口。";
        }
        return `提交失败：${message || "无法链接Server API，请检查域名、HTTPS、CORS 或 PHP 后端。"}`;
      }

      function resetState() {
        clearTimeout(pollTimer);
        clearInterval(countdownTimer);
        currentTaskId = "";
        posterImageUrl = "";
        textHasRendered = false;
        taskIdText.textContent = "";
        statusPanel.hidden = true;
        resultPanel.hidden = true;
        posterPanel.hidden = true;
        summaryGrid.innerHTML = "";
        styleBoard.innerHTML = "";
        posterPreview.innerHTML = '<span class="small">海报生成中，请稍候。</span>';
        countdownText.textContent = "等待海报生成";
        posterPanel.classList.remove("is-waiting");
        downloadPoster.classList.add("is-disabled");
        downloadPoster.removeAttribute("href");
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        })[char]);
      }

      function escapeAttribute(value) {
        return String(value ?? "").replace(/["'<>&]/g, (char) => ({
          "\"": "&quot;",
          "'": "&#039;",
          "<": "&lt;",
          ">": "&gt;",
          "&": "&amp;"
        })[char]);
      }
    </script>
  </body>
</html>
